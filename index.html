    function renderChart(column) {
      if (column === OTHER_DATA_KEY && hasOtherData()) {
        renderOtherDataChart();
        return;
      }
      if (column === WIN_RATE_DATA_KEY && hasWinRateData()) {
        if (winRateSubMode === 'camp') {
          if (hasWinRateCampData()) {
            renderWinRateScatterChart();
          } else {
            renderWinRateEmptyChart('当前赛季数据暂无阵营胜率字段');
          }
        } else if (winRateSubMode === 'identity') {
          if (hasWinRateIdentityData() && winRateIdentityFilter) {
            renderWinrateBarChart(
              getWinRateIdentityGroupRanking(winRateIdentityFilter),
              {
                title: `${winRateIdentityFilter} · 身份胜率`,
                emptySubtext: `暂无「${winRateIdentityFilter}」身份胜率数据`,
              }
            );
          } else {
            renderWinRateEmptyChart('当前赛季数据暂无身份胜率字段');
          }
        } else if (hasWinRateBanxingData() && winRateBanxingFilter) {
          renderWinrateBarChart(
            getWinRateDimensionRanking(BANXING_WIN_RATE_COL, winRateBanxingFilter),
            {
              title: `${winRateBanxingFilter} · 版型胜率`,
              emptySubtext: `暂无「${winRateBanxingFilter}」版型胜率数据`,
            }
          );
        } else {
          renderWinRateEmptyChart('当前赛季数据暂无版型胜率字段');
        }
        return;
      }
      if (column === VOTE_DATA_KEY && hasVoteData()) {
        renderVoteScatterChart();
        return;
      }
      if (column === SKILL_DATA_KEY && hasSkillData()) {
        if (skillSubMode === 'blindwolf') {
          if (hasBlindPoisonWolfRateData()) {
            renderBlindPoisonWolfRateChart();
          } else {
            renderSkillDataEmptyChart();
          }
        } else if (skillSubMode === 'dream') {
          if (hasDreamFirstComboData()) {
            renderDreamFirstComboChart();
          } else {
            renderSkillDataEmptyChart();
          }
        } else if (skillSubMode === 'hunter') {
          if (hasHunterSkillComboData()) {
            renderHunterSkillComboChart();
          } else {
            renderSkillDataEmptyChart();
          }
        } else if (hasWitchPoisonComboData()) {
          renderWitchPoisonComboChart();
        } else {
          renderSkillDataEmptyChart();
        }
        return;
      }
      if (isWolfComboColumn(column) && hasWolfComboData()) {
        if (wolfSubMode === 'rate') {
          if (hasWolfRateData()) {
            if (
              wolfRateBanxingFilter === WOLF_RATE_BANXING_ALL
              || !hasWolfRateBanxingData()
              || !getWolfRateBanxingLabels().includes(wolfRateBanxingFilter)
            ) {
              renderMetricBarChart(WOLF_RATE_COL);
            } else {
              const banxingItems = getBanxingWolfRateChartItems(wolfRateBanxingFilter);
              if (!banxingItems.length) {
                renderWolfDataEmptyChart(`暂无「${wolfRateBanxingFilter}」版型狼人率数据`);
              } else {
                renderMetricBarChart(WOLF_RATE_COL, { items: banxingItems });
              }
            }
          } else {
            renderWolfDataEmptyChart('当前赛季数据暂无狼人率字段');
          }
        } else if (wolfSubMode === 'jixie') {
          renderJixieWolfComboChart();
        } else if (wolfSubMode === 'knife') {
          if (hasSelfKnifeComboData()) {
            renderSelfKnifeComboChart();
          } else {
            renderWolfDataEmptyChart('当前赛季数据暂无自刀统计字段');
          }
        } else if (wolfSubMode === 'witchknife') {
          if (hasFirstKnifeWitchComboData()) {
            renderFirstKnifeWitchComboChart();
          } else {
            renderWolfDataEmptyChart('当前赛季数据暂无首刀女巫统计字段');
          }
        } else if (wolfSubMode === 'lagan') {
          renderLaganTable();
        } else {
          renderWolfComboChart();
        }
        return;
      }
      if (isAppearanceComboColumn(column) && hasAppearanceComboData()) {
        renderAppearanceComboChart();
        return;
      }

      const items = getChartData(column);
      const isPercent = PERCENT_COLUMNS.has(column);
      const isRateColumn = column.includes('率');
      const average = getColumnAverage(column);
      const layout = getChartLayout();

      setChartHeight(items.length);

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {
            const p = params[0];
            return `${p.name}<br/>${formatColumnLabel(column)}：${formatValue(p.value, column)}`;

        grid: getBarChartGrid(layout),
        xAxis: {
          type: 'value',
          axisLabel: {
            color: CHART_AXIS,
            fontSize: layout.axisFontSize,
            formatter: isPercent ? (v) => formatPercent(v) : '{value}'
          },
          splitLine: { lineStyle: { color: CHART_LINE } }
        },
        yAxis: buildBarCategoryYAxis(items.map(d => d.name), layout),
        series: [{
          type: 'bar',
          data: items.map(d => ({
            value: d.value,
            itemStyle: {
              borderRadius: [0, 4, 4, 0],
              color: getBarColor(d.value, average, isRateColumn)
            }
          })),
          ...getBarSeriesLayout(layout),
          label: {
            show: layout.showBarLabel,
            position: 'right',
            color: CHART_TEXT,
            formatter: ({ value }) => formatValue(value, column)
          }
        }],
        animationDuration: 600
      };

      finalizeBarChartOption(option, items, layout, {
        isPercent,
        showRightLabel: layout.showBarLabel,
      });

      chart.setOption(option, true);
      chart.resize();
    }

              ? '暂无出场次数>=9且机械狼次数>0的玩家'
              : '当前赛季数据暂无机械狼统计字段',
            left: 'center',
            top: 'center',
            subtextStyle: { color: CHART_AXIS, fontSize: 12 }
          },
          series: []
        }, true);
        chart.resize();
        return;
      }

      const option = {
        backgroundColor: 'transparent',
        legend: buildChartLegend(JIXIE_WOLF_SEGMENTS.map(seg => seg.label), layout),
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {
            const name = params[0]?.name ?? '';
            const idx = params[0]?.dataIndex ?? 0;
            const row = items[idx];
            return [
              name,
              `${JIXIE_WOLF_TOTAL_COL}：${row.total}`,
              `${JIXIE_CIVILIAN_COL}：${row.civilian}`,
              `${JIXIE_DUAL_COL}：${row.dual}`,
              `${JIXIE_WITCH_COL}：${row.witch}`,
              `${JIXIE_GUARD_COL}：${row.guard}`,
              `${JIXIE_HUNTER_COL}：${row.hunter}`,
              `${JIXIE_MEDIUM_COL}：${row.medium}`
            ].join('<br/>');
          }
        },
        grid: getBarChartGrid(layout, { legendBottom: layout.legendReserve }),
        xAxis: {
          type: 'value',
          minInterval: 1,
          axisLabel: { color: CHART_AXIS, fontSize: layout.axisFontSize },
          splitLine: { lineStyle: { color: CHART_LINE } }
        },
        yAxis: buildBarCategoryYAxis(items.map(d => d.name), layout),
        series: JIXIE_WOLF_SEGMENTS.map((seg, idx) => {
          const isFirst = idx === 0;
          const isLast = idx === JIXIE_WOLF_SEGMENTS.length - 1;
          const labelColor = seg.labelColor || CHART_SURFACE;
          return {
            name: seg.label,
            type: 'bar',
            stack: 'jixieWolf',
            data: items.map(d => d[seg.field]),
            ...getBarSeriesLayout(layout),
            itemStyle: {
              color: seg.color,
              borderColor: seg.borderColor || seg.color,
              borderWidth: seg.borderColor ? 1 : 0,
              borderRadius: isFirst
                ? [4, 0, 0, 4]
                : (isLast ? [0, 4, 4, 0] : 0)
            },
            label: isLast
              ? {
                  show: layout.showBarLabel,
                  position: 'right',
                  color: CHART_TEXT,
                  formatter: (p) => String(items[p.dataIndex].total)
                }
              : {
                  show: layout.showBarLabel,
                  position: 'inside',
                  color: labelColor,
                  fontSize: 11,
                  formatter: ({ value }) => (value > 0 ? String(value) : '')
                }
          };
        }),
        animationDuration: 600
      };

      finalizeBarChartOption(option, items, layout, {
        showRightLabel: layout.showBarLabel,
        getPeak: (rows) => Math.max(...rows.map(r => r.total)),
      });

      chart.setOption(option, true);
      chart.resize();
    }

    function getAvailableRadarColumns() {
      const row = rawData[0] || {};
      return RADAR_METRIC_OPTIONS.filter(col => col in row);
    }

    function getRadarIndicatorMax(column) {
      if (PERCENT_COLUMNS.has(column) || column.includes('率')) return 100;
      const rows = getMinAppearanceRows();
      if (!rows.length) return column === '出场次数' ? 30 : 5;
      const peak = Math.max(...rows.map(item => parseValue(item[column], column)), 0);
      if (column === '出场次数') return Math.ceil(Math.max(peak * 1.05, 10));
      if (SURVIVAL_DAY_COLUMNS.has(column)) return Math.ceil(Math.max(peak * 1.1, 3));
      return Math.ceil(Math.max(peak * 1.1, 1));
    }

    function buildRadarIndicators(columns) {
      return columns.map(col => ({ name: formatColumnLabel(col), max: getRadarIndicatorMax(col) }));
    }

    function getSelectedRadarColumns() {
      const available = getAvailableRadarColumns();
      const selection = getRadarCheckboxSelection('radarMetricFilters');
      if (selection === null) return available;
      return available.filter(col => selection.has(col));
    }

    function getDefaultRadarMetricSelection(available) {
      const selected = RADAR_METRIC_DEFAULT.filter(col => available.includes(col));
      return selected.length ? new Set(selected) : null;
    }

    function refreshRadarMetricFilters() {
      const available = getAvailableRadarColumns();
      const boxes = getRadarItemCheckboxes('radarMetricFilters');
      let selection;
      if (!boxes.length) {
        selection = getDefaultRadarMetricSelection(available);
      } else {
        const prev = getRadarCheckboxSelection('radarMetricFilters');
        if (prev === null) {
          selection = null;
        } else {
          selection = new Set([...prev].filter(c => available.includes(c)));
          if (selection.size === 0) selection = getDefaultRadarMetricSelection(available);
        }
      }
      renderRadarCheckboxGroup('radarMetricFilters', available, selection);
    }

    function handleRadarMetricFilterChange(e) {
      if (currentView !== 'radar' || radarSubMode !== 'radar') return;
      if (e.target.classList.contains('radar-filter-all-cb')) {
        if (!e.target.checked) {
          e.target.checked = true;
          return;
        }
        getRadarItemCheckboxes('radarMetricFilters').forEach(cb => { cb.checked = true; });
      } else if (e.target.classList.contains('radar-filter-item-cb')) {
        const items = getRadarItemCheckboxes('radarMetricFilters');
        const checkedCount = items.filter(cb => cb.checked).length;
        if (!e.target.checked && checkedCount < RADAR_MIN_METRICS) {
          e.target.checked = true;
          return;
        }
        syncRadarSelectAllCheckbox('radarMetricFilters');
      }
      renderRadarChart($('nameSelect').value);
    }

    function getAverageValues(columns = RADAR_METRIC_OPTIONS) {
      const rows = getMinAppearanceRows();
      if (!rows.length) return columns.map(() => 0);
      return columns.map(col => {
        const sum = rows.reduce((acc, item) => acc + parseValue(item[col], col), 0);
        return sum / rows.length;
      });
    }

    function getPlayerValues(name, columns = RADAR_METRIC_OPTIONS) {
      const player = getMinAppearanceRows().find(item => item[NAME_KEY] === name)
        || rawData.find(item => item[NAME_KEY] === name);
      if (!player) return columns.map(() => 0);
      return columns.map(col => parseValue(player[col], col));
    }

    function getRadarTableDataColumn(column) {
      return RADAR_TABLE_DATA_COLUMN_ALIASES[column] ?? column;
    }

    function isRadarTableMergedColumn(column) {
      return RADAR_TABLE_MERGED_BY_LABEL.has(column);
    }

    function getRadarTableRankColumn(column) {
      return RADAR_TABLE_MERGED_BY_LABEL.get(column)?.rateCol ?? getRadarTableDataColumn(column);
    }

    function formatRadarMergedDisplay(player, label) {
      const { rateCol, countCol } = RADAR_TABLE_MERGED_BY_LABEL.get(label);
      const rateStr = formatValue(parseValue(player[rateCol], rateCol), rateCol);
      const countStr = formatValue(parseValue(player[countCol], countCol), countCol);
      return `${rateStr}（${countStr}）`;
    }

    function getRadarTableColumns() {
      const row = rawData[0] || {};
      return RADAR_TABLE_COLUMNS.filter(col => {
        if (RADAR_TABLE_HIDDEN_COLUMNS.has(col)) return false;
        if (isRadarTableMergedColumn(col)) {
          return RADAR_TABLE_MERGED_BY_LABEL.get(col).rateCol in row;
        }
        if (RADAR_TABLE_MERGED_SUB_COLUMNS.has(col)) return false;
        return getRadarTableDataColumn(col) in row;
      });
    }

    function getRadarTableGroupedColumns() {
      const available = new Set(getRadarTableColumns());
      const assigned = new Set();
      const groups = [];

      RADAR_TABLE_GROUP_DEFS.forEach(({ title, columns }) => {
        const cols = columns.filter(col => available.has(col));
        cols.forEach(col => assigned.add(col));
        if (cols.length) groups.push({ title, columns: cols });
      });

      const otherCols = [
        ...RADAR_TABLE_OTHER_COLUMN_ORDER.filter(col => available.has(col) && !assigned.has(col)),
        ...getRadarTableColumns().filter(col => !assigned.has(col)
          && !RADAR_TABLE_OTHER_COLUMN_ORDER.includes(col)
          && !RADAR_TABLE_MERGED_SUB_COLUMNS.has(col)
          && !RADAR_TABLE_HIDDEN_COLUMNS.has(col)),
      ];
      otherCols.forEach(col => assigned.add(col));
      if (otherCols.length) groups.push({ title: '其他', columns: otherCols });

      const trailingCols = RADAR_TABLE_TRAILING_COLUMNS.filter(
        col => available.has(col) && !assigned.has(col)
      );
      trailingCols.forEach(col => assigned.add(col));
      if (trailingCols.length) groups.push({ title: '', columns: trailingCols });

      return groups;
    }

    function isRadarTableCountColumn(col) {
      return col.includes('次数');
    }

    function isRadarTableTextColumn(col) {
      return RADAR_TABLE_TEXT_COLUMNS.has(col);
    }

    function normalizeStandWolfBadgeText(text) {
      if (!text || !String(text).trim()) return '';
      const counts = new Map();
      String(text).split(/[,、]/).map(part => part.trim()).filter(Boolean).forEach(part => {
        counts.set(part, (counts.get(part) || 0) + 1);
      });
      return [...counts.entries()]
        .map(([part, count]) => `${part}（${count}）`)
        .join('、');
    }

    function getRadarTextDisplayValue(name, col) {
      const playerVal = getRadarTablePlayer(name, col);
      if (col === STAND_WOLF_BADGE_COL) {
        return normalizeStandWolfBadgeText(playerVal);
      }
      if (col === SEAT_NUMBER_DETAIL_COL) {
        return formatSeatNumberDetailText(playerVal);
      }
      return playerVal;
    }

    function renderRadarTextOnlyRow(name, col) {
      const valueHtml = formatRadarDetailText(getRadarTextDisplayValue(name, col));
      return `<div class="radar-stats-row is-text">
        <span class="col-metric">${formatRadarMetricLabelHtml(col)}</span>
        <span class="col-value col-span-detail">${valueHtml || '—'}</span>
      </div>`;
    }

    function hasProphetSummaryData() {
      const row = rawData[0] || {};
      return PROPHET_SUMMARY_FIELDS.games in row;
    }

    function getPlayerStatCount(player, column) {
      if (!player || !(column in player)) return 0;
      return parseValue(player[column], column);
    }

    function prophetSummaryNum(value) {
      return `<span class="radar-summary-num">${value}</span>`;
    }

    function formatProphetSummaryHtml(name) {
      const player = getRadarPlayerRecord(name);
      if (!player || !hasProphetSummaryData()) return '';

      const counts = {
        games: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.games),
        noJump: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.noJump),
        badge: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.badge),
        exiled: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.exiled),
        didi: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.didi),
        helpDidi: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.helpDidi),
        poison: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.poison),
        blindPoison: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.blindPoison),
        shot: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.shot),
        milk: getPlayerStatCount(player, PROPHET_SUMMARY_FIELDS.milk),
      };
      const didiRecord = String(player[PROPHET_SUMMARY_FIELDS.didiRecord] ?? '').trim();
      const helpDidiRecord = String(player[PROPHET_SUMMARY_FIELDS.helpDidiRecord] ?? '').trim();

      let html = `预通 ${prophetSummaryNum(counts.games)} 局，警上未起跳 ${prophetSummaryNum(counts.noJump)} 次，获得警徽 ${prophetSummaryNum(counts.badge)} 次，被放逐 ${prophetSummaryNum(counts.exiled)} 次`;

      const extras = [];
      if (counts.poison > 0) extras.push(`被毒 ${prophetSummaryNum(counts.poison)} 次`);
      if (counts.blindPoison > 0) extras.push(`被盲毒 ${prophetSummaryNum(counts.blindPoison)} 次`);
      if (counts.shot > 0) extras.push(`被猎人带走 ${prophetSummaryNum(counts.shot)} 次`);
      if (counts.milk > 0) extras.push(`被奶死 ${prophetSummaryNum(counts.milk)} 次`);
      if (counts.didi > 0) {
        let segment = `被好人代跳 ${prophetSummaryNum(counts.didi)} 次`;
        if (didiRecord) {
          segment += `<span class="radar-text-count">（${escapeHtml(didiRecord)}）</span>`;
        }
        extras.push(segment);
      }
      if (counts.helpDidi > 0) {
        let segment = `代预起跳 ${prophetSummaryNum(counts.helpDidi)} 次`;
        if (helpDidiRecord) {
          segment += `<span class="radar-text-count">（${escapeHtml(helpDidiRecord)}）</span>`;
        }
        extras.push(segment);
      }
      if (extras.length) {
        html += extras.map(segment => `、${segment}`).join('');
      }
      return html;
    }

    function renderProphetSummaryRow(name) {
      const html = formatProphetSummaryHtml(name);
      if (!html) return '';
      return `<div class="radar-stats-row is-text radar-prophet-summary">
        <span class="col-metric">总结</span>
        <span class="col-value col-span-detail">${html}</span>
      </div>`;
    }

    function getRadarTableMergedCount(player, column) {
      if (!player || !isRadarTableMergedColumn(column)) return null;
      const { countCol } = RADAR_TABLE_MERGED_BY_LABEL.get(column);
      return parseValue(player[countCol], countCol);
    }

    function renderRadarTableRow(name, col) {
      if (isRadarTableTextColumn(col)) {
        return renderRadarTextOnlyRow(name, col);
      }
      const rankCol = getRadarTableRankColumn(col);
      const player = getMinAppearanceRows().find(item => item[NAME_KEY] === name);
      const playerVal = player ? parseValue(player[rankCol], rankCol) : 0;
      const avgVal = getRadarTableAverage(rankCol);
      const { rankMap } = getMetricRankMap(rankCol);
      const bottomRanks = getBottomRankSet(rankMap);
      const rankEligible = getMetricRankEligibleRows().some(item => item[NAME_KEY] === name);
      const rank = rankEligible ? rankMap.get(name) : null;
      const mergedCount = getRadarTableMergedCount(player, col);
      const rankClass = getRankHighlightClass(rank, bottomRanks, playerVal, avgVal, rankCol, mergedCount);
      const rankHtml = rank != null
        ? `<span class="radar-rank-pill">${rank}</span>`
        : '<span class="radar-rank-empty">—</span>';
      const metricLabel = formatRadarMetricLabelHtml(col);
      const displayValue = isRadarTableMergedColumn(col)
        ? (player ? formatRadarMergedDisplay(player, col) : '—')
        : formatValue(playerVal, rankCol);
      if (isRadarTableCountColumn(col) && !isRadarTableMergedColumn(col)) {
        return `<div class="radar-stats-row is-count">
          <span class="col-metric">${metricLabel}</span>
          <span class="col-value">${formatRadarValueHtml(displayValue)}</span>
          <span class="col-rank"><span class="radar-rank-empty">—</span></span>
          <span class="col-avg"><span class="radar-rank-empty">—</span></span>
        </div>`;
      }
      const hideAvg = RADAR_TABLE_RANK_NO_AVG_COLUMNS.has(col);
      return `<div class="radar-stats-row${rankClass ? ` ${rankClass}` : ''}">
        <span class="col-metric">${metricLabel}</span>
        <span class="col-value">${formatRadarValueHtml(displayValue)}</span>
        <span class="col-rank">${rankHtml}</span>
        <span class="col-avg">${hideAvg
          ? '<span class="radar-rank-empty">—</span>'
          : formatRadarTableAverage(avgVal, rankCol)}</span>
      </div>`;
    }

    function renderRadarPersonalTable(name) {
      const groups = getRadarTableGroupedColumns();
      const playerEl = document.getElementById('radarTablePlayerName');
      const body = document.getElementById('radarTableBody');

      if (playerEl) playerEl.textContent = name;
      if (!groups.length) {
        body.innerHTML = '<p class="radar-stats-empty">暂无可用数据</p>';
        return;
      }

      body.innerHTML = groups.map(({ title, columns }) => {
        const summaryRow = title === '预言家相关' && hasProphetSummaryData()
          ? renderProphetSummaryRow(name)
          : '';
        return `
        <section class="radar-stats-group">
          ${title ? `<h3 class="radar-stats-group-title">${escapeHtml(title)}</h3>` : ''}
          <div class="radar-stats-group-grid">
            <div class="radar-stats-row radar-stats-head" aria-hidden="true">
              <span class="col-metric">指标</span>
              <span class="col-value">数值</span>
              <span class="col-rank">排名</span>
              <span class="col-avg">平均</span>
            </div>
            ${columns.map(col => renderRadarTableRow(name, col)).join('')}
            ${summaryRow}
          </div>
        </section>`;
      }).join('');
    }

    function getRadarTableAverage(column) {
      const rankCol = getRadarTableRankColumn(column);
      const rows = getMinAppearanceRows();
      if (!rows.length) return 0;
      const sum = rows.reduce((acc, item) => acc + parseValue(item[rankCol], rankCol), 0);
      return sum / rows.length;
    }

    function getRadarTablePlayer(name, column) {
      const dataCol = getRadarTableDataColumn(column);
      const player = getMinAppearanceRows().find(item => item[NAME_KEY] === name);
      if (!player) return RADAR_TABLE_TEXT_COLUMNS.has(column) ? '' : 0;
      if (RADAR_TABLE_TEXT_COLUMNS.has(column)) {
        return player[dataCol] ?? '';
      }
      return parseValue(player[dataCol], dataCol);
    }

    function getMetricRankCompareValue(value, column) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 0;
      if (PERCENT_COLUMNS.has(column) || SURVIVAL_DAY_COLUMNS.has(column)) {
        return Math.round(num * 10) / 10;
      }
      return num;
    }

    function getMetricRankMap(column) {
      const rows = getMetricRankEligibleRows();
      const sorted = rows
        .map(item => {
          const raw = parseValue(item[column], column);
          return {
            name: item[NAME_KEY],
            value: getMetricRankCompareValue(raw, column),
            displayKey: formatValue(raw, column),
          };
        })
        .sort((a, b) => b.value - a.value || a.name.localeCompare(b.name, 'zh-CN'));
      const rankMap = new Map();
      sorted.forEach((item, index) => {
        if (index === 0) {
          rankMap.set(item.name, 1);
          return;
        }
        const prev = sorted[index - 1];
        rankMap.set(
          item.name,
          item.displayKey === prev.displayKey ? rankMap.get(prev.name) : index + 1
        );
      });
      return { rankMap, total: sorted.length };
    }

    function getBottomRankSet(rankMap) {
      const ranks = [...new Set(rankMap.values())].sort((a, b) => a - b);
      return new Set(ranks.slice(-3));
    }

    function getRankHighlightClass(rank, bottomRanks, playerVal, avgVal, column, mergedCount = null) {
      if (!rank) return '';
      if (rank <= 3) return 'rank-top';
      if (bottomRanks.has(rank)) {
        if (mergedCount === 0) return '';
        const p = getMetricRankCompareValue(playerVal, column);
        const a = getMetricRankCompareValue(avgVal, column);
        if (p > a) return '';
        return 'rank-bottom';
      }
      return '';
    }

    function wrapRadarParenMeta(text) {
      if (text == null || text === '') return '';
      const escaped = escapeHtml(String(text));
      return escaped
        .replace(/（[^）]*）/g, (match) => `<span class="radar-text-count">${match}</span>`)
        .replace(/\([^)]*\)/g, (match) => `<span class="radar-text-count">${match}</span>`);
    }

    function formatRadarValueHtml(value) {
      if (value == null || value === '' || value === '—') return '—';
      return wrapRadarParenMeta(value);
    }

    function formatRadarDetailText(text) {
      if (!text || !String(text).trim()) return '';
      return String(text)
        .split('、')
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => wrapRadarParenMeta(part.replace(/（1）/g, '')))
        .join('、');
    }

    function renderRadarChart(name) {
      const columns = getSelectedRadarColumns();
      const avgLabel = '平均值';
      const layout = getChartLayout();
      const radarSideLayout = currentView === 'radar' && !isMobile();

      document.getElementById('chart').style.height = isMobile() ? '300px' : '480px';

      if (columns.length < RADAR_MIN_METRICS) {
        chart.setOption({
          backgroundColor: 'transparent',
          title: {
            subtext: `请至少选择 ${RADAR_MIN_METRICS} 项雷达指标`,
            left: 'center',
            top: 'center',
            subtextStyle: { color: CHART_AXIS, fontSize: 12 }
          },
          series: []
        }, true);
        chart.resize();
        return;
      }

      const playerValues = getPlayerValues(name, columns);
      const avgValues = getAverageValues(columns);

      const option = {
        backgroundColor: 'transparent',
        legend: buildChartLegend([name, avgLabel], layout),
        tooltip: {
          trigger: 'item',
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {
            const lines = params.value.map((v, i) =>
              `${formatColumnLabel(columns[i])}：${formatValue(v, columns[i])}`
            );
            return `${params.name}<br/>${lines.join('<br/>')}`;
          }
        },
        radar: {
          center: radarSideLayout ? ['50%', '50%'] : layout.radarCenter,
          radius: radarSideLayout ? layout.radarSideRadius : layout.radarRadius,
          axisName: { color: CHART_TEXT, fontSize: layout.radarNameFontSize },
          splitLine: { lineStyle: { color: CHART_LINE } },
          splitArea: { areaStyle: { color: [CHART_RADAR_BAND_A, CHART_RADAR_BAND_B] } },
          axisLine: { lineStyle: { color: CHART_LINE } },
          indicator: buildRadarIndicators(columns)
        },
        series: [{
          type: 'radar',
          data: [
            {
              value: playerValues,
              name,
              symbol: 'circle',
              symbolSize: 6,
              lineStyle: { color: COMPARE_PLAYER_COLOR, width: 2 },
              itemStyle: { color: COMPARE_PLAYER_COLOR },
              areaStyle: { color: CHART_RADAR_PLAYER_AREA, opacity: 0.35 }
            },
            {
              value: avgValues,
              name: avgLabel,
              symbol: 'none',
              lineStyle: { color: COMPARE_AVG_COLOR, width: 2 },
              itemStyle: { color: COMPARE_AVG_COLOR },
            }
          ]
        }],
        animationDuration: 600
      };

      chart.setOption(option, true);
      chart.resize();
    }

    function renderRadarWinrateChart(name) {
      const player = getMinAppearanceRows().find(item => item[NAME_KEY] === name)
        || rawData.find(item => item[NAME_KEY] === name);
      const isBanxing = radarWinrateDim === 'banxing';
      const col = isBanxing ? BANXING_WIN_RATE_COL : IDENTITY_WIN_RATE_COL;
      const dimLabel = isBanxing ? '版型' : '身份';
      const parsed = parseWinRateBreakdown(player?.[col]);
      const items = isBanxing
        ? filterWinRateBreakdownItems(parsed, col)
        : parsed;
      const overallRate = parseValue(player?.['总胜率'], '总胜率');

      renderWinrateBarChart(items, {
        title: `${name} · ${dimLabel}胜率`,
        average: overallRate,
        emptySubtext: `${name}：暂无${dimLabel}胜率数据`,
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function hasParticipationData() {
      return rawData.length > 0 && PARTICIPATION_COL in rawData[0];
    }

    function getVideoLinkCategory() {
      return getSeriesKeyForSeason(currentSeason) === 'yuexiao' ? '粤小' : '京城大师赛';
    }

    const CN_NUMERAL_MAP = {
      '零': 0, '一': 1, '二': 2, '两': 2, '三': 3, '四': 4,
      '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10,
    };

    function chineseNumeralToInt(text) {
      const s = String(text).trim();
      if (/^\d+$/.test(s)) return parseInt(s, 10) || 0;
      if (s.length === 1) return CN_NUMERAL_MAP[s] ?? 0;
      if (s === '十') return 10;
      if (s.startsWith('十')) return 10 + (CN_NUMERAL_MAP[s.slice(1)] ?? 0);
      if (s.endsWith('十')) return (CN_NUMERAL_MAP[s[0]] ?? 0) * 10;
      if (s.includes('十')) {
        const [head, tail] = s.split('十');
        return (CN_NUMERAL_MAP[head] ?? 0) * 10 + (CN_NUMERAL_MAP[tail] ?? 0);
      }
      return 0;
    }

    function parseVideoTitleDatePrefix(title) {
      const trimmed = String(title).trim();
      let match = trimmed.match(/^(\d{4})(\d{2})(\d{2})\b/);
      if (match) {
        return `${match[1]}${match[2]}${match[3]}`;
      }
      match = trimmed.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (match) {
        return `${match[1]}${match[2]}${match[3]}`;
      }
      return '';
    }

    function extractVideoTitleRounds(title) {
      const rounds = [];
      const re = /第([0-9一二三四五六七八九十两]+)局/g;
      let match;
      while ((match = re.exec(title)) !== null) {
        const round = chineseNumeralToInt(match[1]);
        if (round > 0 && !rounds.includes(round)) {
          rounds.push(round);
        }
      }
      return rounds;
    }

    function buildVideoLinkIndex() {
      videoLinkIndex['京城大师赛'] = {};
      videoLinkIndex['粤小'] = {};
      videoLinkDayIndex['粤小'] = {};
      if (!videoLinksPayload) return;

      for (const category of ['京城大师赛', '粤小']) {
        const collections = videoLinksPayload[category] || [];
        for (const collection of collections) {
          for (const video of collection['视频'] || []) {
            const title = video['标题'];
            const link = video['链接'];
            if (!title || !link) continue;

            const day = parseVideoTitleDatePrefix(title);
            if (!day) continue;

            const rounds = extractVideoTitleRounds(title);
            if (rounds.length > 0) {
              for (const round of rounds) {
                const key = `${day}_${round}`;
                if (!videoLinkIndex[category][key]) {
                  videoLinkIndex[category][key] = link;
                }
              }
            } else if (category === '粤小') {
              if (!videoLinkDayIndex[category][day]) {
                videoLinkDayIndex[category][day] = link;
              }
            }
          }
        }
      }
    }

    async function loadVideoLinks() {
      try {
        const res = await fetch(VIDEO_LINKS_FILE);
        if (!res.ok) return;
        videoLinksPayload = await res.json();
        buildVideoLinkIndex();
      } catch (_) {
        videoLinksPayload = null;
      }
    }

    function parseSessionRawDateParts(rawDate) {
      const dateStr = String(rawDate).trim();
      if (/^\d{10,}$/.test(dateStr)) {
        const round = parseInt(dateStr.slice(-2), 10);
        const day = dateStr.slice(0, -2);
        if (day && Number.isFinite(round) && round > 0) {
          return { day, round };
        }
      }
      const { day, roundNum } = parseGameDateDisplay(dateStr);
      if (day && roundNum > 0) {
        return { day: String(day), round: roundNum };
      }
      return { day: '', round: 0 };
    }

    function findVideoLink(rawDate) {
      if (!videoLinksPayload) return '';
      const category = getVideoLinkCategory();
      const index = videoLinkIndex[category];
      if (!index) return '';

      const { day, round } = parseSessionRawDateParts(rawDate);
      if (!day || !round) return '';

      const exactKey = `${day}_${round}`;
      if (index[exactKey]) return index[exactKey];

      if (category === '粤小') {
        return videoLinkDayIndex[category][day] || '';
      }
      return '';
    }

    function parseGameSessions(text) {
      if (text == null || String(text).trim() === '') return [];
      return String(text)
        .split('、')
        .map(s => s.trim())
        .filter(Boolean)
        .map(entry => {
          const m = entry.match(/^(.+?)[（(](.+?)[，,](.+?)[）)]$/);
          if (!m) {
            return { date: entry, banxing: '', identity: '', key: entry };
          }
          const session = { date: m[1].trim(), banxing: m[2].trim(), identity: m[3].trim() };
          session.key = `${session.date}|${session.banxing}|${session.identity}`;
          return session;
        });
    }

    function parseGameDateDisplay(dateRaw) {
      const dateStr = String(dateRaw).trim();
      if (dateStr.length < 3) {
        return { day: dateStr, roundLabel: '', roundNum: 0 };
      }
      const day = dateStr.slice(0, -2);
      const roundNum = parseInt(dateStr.slice(-2), 10);
      const roundLabel = Number.isFinite(roundNum) ? `第${roundNum}场` : dateStr.slice(-2);
      return { day, roundLabel, roundNum: Number.isFinite(roundNum) ? roundNum : 0 };
    }

    function sortGameSessions(sessions) {
      return sessions.slice().sort((a, b) => {
        const da = parseGameDateDisplay(a.date);
        const db = parseGameDateDisplay(b.date);
        const dayA = Number(da.day) || 0;
        const dayB = Number(db.day) || 0;
        if (dayA !== dayB) return dayA - dayB;
        return da.roundNum - db.roundNum;
      });
    }

    function formatGameSessionHtml(session) {
      const { day, roundLabel } = parseGameDateDisplay(session.date);
      const detailParts = [roundLabel, session.banxing, session.identity].filter(Boolean);
      const detail = detailParts.join('/');
      if (!detail) {
        return escapeHtml(day || session.date);
      }
      return `${escapeHtml(day)} <span class="game-session-detail">${escapeHtml(detail)}</span>`;
    }

    const GAME_SESSION_VIDEO_ICON =
      '<svg class="game-session-video-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true" focusable="false">' +
      '<path fill="currentColor" d="M2 4.5A1.5 1.5 0 0 1 3.5 3h9A1.5 1.5 0 0 1 14 4.5v7a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 11.5v-7zm3.2 1.4v4.2l3.8-2.1-3.8-2.1z"/>' +
      '</svg>';

    function formatDateWithVideoIcon(rawDate) {
      const dateStr = escapeHtml(String(rawDate ?? '').trim());
      if (!dateStr) return '';
      if (!findVideoLink(String(rawDate).trim())) return dateStr;
      return `<span class="session-date-with-video">${dateStr}${GAME_SESSION_VIDEO_ICON}</span>`;
    }

    function getRadarPlayerRecord(name) {
      return getMinAppearanceRows().find(item => item[NAME_KEY] === name)
        || rawData.find(item => item[NAME_KEY] === name);
    }

    function getPlayerGameSessions(name) {
      const player = getRadarPlayerRecord(name);
      if (!player) return { participation: [], wins: new Set() };
      const participation = parseGameSessions(player[PARTICIPATION_COL]);
      const wins = new Set(parseGameSessions(player[WIN_SESSIONS_COL]).map(s => s.key));
      return { participation, wins };
    }

    function getRadarItemCheckboxes(containerId) {
      return [...document.querySelectorAll(`#${containerId} input.radar-filter-item-cb`)];
    }

    function getRadarCheckboxSelection(containerId) {
      const boxes = getRadarItemCheckboxes(containerId);
      if (!boxes.length) return null;
      const checked = boxes.filter(cb => cb.checked);
      if (!checked.length) return new Set();
      if (checked.length === boxes.length) return null;
      return new Set(checked.map(cb => cb.value));
    }

    function syncRadarSelectAllCheckbox(containerId) {
      const allCb = document.querySelector(`#${containerId} input.radar-filter-all-cb`);
      if (!allCb) return;
      const items = getRadarItemCheckboxes(containerId);
      allCb.checked = items.length > 0 && items.every(cb => cb.checked);
    }

    function renderRadarCheckboxGroup(containerId, values, selectedSet) {
      const container = document.getElementById(containerId);
      if (!values.length) {
        container.innerHTML = '<span class="radar-filter-empty">—</span>';
        return;
      }
      const allChecked = selectedSet === null
        || (selectedSet.size > 0 && selectedSet.size === values.length);
      const allHtml =
        `<label class="radar-filter-check radar-filter-select-all">` +
        `<input type="checkbox" class="radar-filter-all-cb" data-filter-group="${containerId}"${allChecked ? ' checked' : ''}>` +
        `<span>全部</span></label>`;
      const itemsHtml = values.map(v => {
        const checked = selectedSet === null || selectedSet.has(v);
        return `<label class="radar-filter-check"><input type="checkbox" class="radar-filter-item-cb" value="${escapeHtml(v)}"${checked ? ' checked' : ''}><span>${formatRadarMetricLabelHtml(v)}</span></label>`;
      }).join('');
      container.innerHTML = allHtml + itemsHtml;
    }

    function refreshRadarGameFilterOptions(name) {
      const { participation } = getPlayerGameSessions(name);
      const playerChanged = name !== lastRadarGamesPlayer;
      lastRadarGamesPlayer = name;

      const banxings = [...new Set(participation.map(s => s.banxing).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'zh-CN'));
      const identities = [...new Set(participation.map(s => s.identity).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'zh-CN'));

      const prevBanxing = playerChanged ? null : getRadarCheckboxSelection('radarBanxingFilters');
      const prevIdentity = playerChanged ? null : getRadarCheckboxSelection('radarIdentityFilters');

      const banxingSelection = playerChanged ? null : (
        prevBanxing === null ? null : new Set([...prevBanxing].filter(v => banxings.includes(v)))
      );
      const identitySelection = playerChanged ? null : (
        prevIdentity === null ? null : new Set([...prevIdentity].filter(v => identities.includes(v)))
      );

      renderRadarCheckboxGroup('radarBanxingFilters', banxings, banxingSelection);
      renderRadarCheckboxGroup('radarIdentityFilters', identities, identitySelection);
    }

    function sessionMatchesRadarFilters(session, banxingFilter, identityFilter) {
      if (banxingFilter !== null && !banxingFilter.has(session.banxing)) return false;
      if (identityFilter !== null && !identityFilter.has(session.identity)) return false;
      return true;
    }

    function updateRadarGamesVisibility() {
      updateRadarPanelsVisibility();
    }

    function formatRadarRateWithCount(rate, count) {
      const n = Number(count) || 0;
      if (n <= 0) {
        return '<span class="radar-rank-empty">—</span>';
      }
      const rateText = rate == null || rate === '' ? '0.0%' : String(rate);
      return wrapRadarParenMeta(`${rateText}（${n}）`);
    }

    function getPlayerSeatNumberRows(name) {
      return seatNumberStatsData
        .filter(row => row['姓名'] === name)
        .slice()
        .sort((a, b) => Number(a['座位号']) - Number(b['座位号']));
    }

    function hasSeatNumberStatsData() {
      return seatNumberStatsData.length > 0;
    }

    function parseSeatRateText(text) {
      if (text == null || text === '') return null;
      const match = String(text).trim().match(/^(-?\d+(?:\.\d+)?)%$/);
      return match ? Number(match[1]) / 100 : null;
    }

    function summarizePlayerSeatAverages(rows) {
      let totalGames = 0;
      let wolfCount = 0;
      let wolfWinWeighted = 0;
      let goodCount = 0;
      let goodWinWeighted = 0;
      let sheriffCount = 0;
      let sheriffCorrectWeighted = 0;
      let exileCount = 0;
      let exileCorrectWeighted = 0;

      rows.forEach((row) => {
        const games = Number(row['场次']) || 0;
        totalGames += games;

        const wolfTimes = Number(row['狼人次数']) || 0;
        wolfCount += wolfTimes;
        const wolfRate = parseSeatRateText(row['狼人胜率']);
        if (wolfTimes > 0 && wolfRate != null) wolfWinWeighted += wolfRate * wolfTimes;

        const goodTimes = Number(row['好人次数']) || 0;
        goodCount += goodTimes;
        const goodRate = parseSeatRateText(row['好人胜率']);
        if (goodTimes > 0 && goodRate != null) goodWinWeighted += goodRate * goodTimes;

        const sheriffTimes = Number(row['警徽票次数']) || 0;
        sheriffCount += sheriffTimes;
        const sheriffRate = parseSeatRateText(row['警徽票正确率']);
        if (sheriffTimes > 0 && sheriffRate != null) {
          sheriffCorrectWeighted += sheriffRate * sheriffTimes;
        }

        const exileTimes = Number(row['放逐票次数']) || 0;
        exileCount += exileTimes;
        const exileRate = parseSeatRateText(row['放逐票正确率']);
        if (exileTimes > 0 && exileRate != null) exileCorrectWeighted += exileRate * exileTimes;
      });

      const weightedRate = (weightedSum, count) => (
        count > 0 ? formatPercent(weightedSum / count * 100) : '0.0%'
      );

      return {
        场次: totalGames,
        狼人胜率: weightedRate(wolfWinWeighted, wolfCount),
        狼人次数: wolfCount,
        好人胜率: weightedRate(goodWinWeighted, goodCount),
        好人次数: goodCount,
        警徽票正确率: weightedRate(sheriffCorrectWeighted, sheriffCount),
        警徽票次数: sheriffCount,
        放逐票正确率: weightedRate(exileCorrectWeighted, exileCount),
        放逐票次数: exileCount,
      };
    }

    function buildSeatColumnHighlights(rows) {
      const metrics = [
        {
          getValue: (row) => parseSeatRateText(row['狼人胜率']),
          canCompare: (row) => (Number(row['狼人次数']) || 0) > 0,
        },
        {
          getValue: (row) => parseSeatRateText(row['好人胜率']),
          canCompare: (row) => (Number(row['好人次数']) || 0) > 0,
        },
        {
          getValue: (row) => parseSeatRateText(row['警徽票正确率']),
          canCompare: (row) => (Number(row['警徽票次数']) || 0) > 0,
        },
        {
          getValue: (row) => parseSeatRateText(row['放逐票正确率']),
          canCompare: (row) => (Number(row['放逐票次数']) || 0) > 0,
        },
      ];
      const highlights = rows.map(() => ({}));

      metrics.forEach((metric, metricIndex) => {
        const colIndex = metricIndex + 1;
        const entries = rows.flatMap((row, rowIndex) => {
          if (!metric.canCompare(row)) return [];
          const value = metric.getValue(row);
          if (value == null || !Number.isFinite(value)) return [];
          return [{ rowIndex, value }];
        });
        if (entries.length <= 1) return;

        const max = Math.max(...entries.map(entry => entry.value));
        const min = Math.min(...entries.map(entry => entry.value));
        if (max === min) return;

        entries.forEach(({ rowIndex, value }) => {
          if (value === max) highlights[rowIndex][colIndex] = 'high';
          if (value === min) highlights[rowIndex][colIndex] = 'low';
        });
      });

      return highlights;
    }

    function seatCellClass(highlight) {
      if (highlight === 'high') return ' class="seat-value-high"';
      if (highlight === 'low') return ' class="seat-value-low"';
      return '';
    }

    function renderRadarSeatSection(name) {
      const playerEl = document.getElementById('radarSeatPlayerName');
      const body = document.getElementById('radarSeatBody');
      if (playerEl) playerEl.textContent = name;
      if (!body) return;

      if (!hasSeatNumberStatsData()) {
        body.innerHTML = '<tr><td colspan="6" class="radar-seat-empty">暂无座位号统计数据</td></tr>';
        return;
      }

      const rows = getPlayerSeatNumberRows(name);
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="6" class="radar-seat-empty">该玩家暂无座位号数据</td></tr>';
        return;
      }

      const highlights = buildSeatColumnHighlights(rows);

      body.innerHTML = rows.map((row, rowIndex) => {
        const seat = Number(row['座位号']);
        const games = Number(row['场次']) || 0;
        const rowHighlights = highlights[rowIndex] || {};
        return `<tr>
          <td class="col-seat">${escapeHtml(Number.isFinite(seat) ? `${seat}号位` : String(row['座位号'] ?? ''))}</td>
          <td>${games}</td>
          <td${seatCellClass(rowHighlights[1])}>${formatRadarRateWithCount(row['狼人胜率'], row['狼人次数'])}</td>
          <td${seatCellClass(rowHighlights[2])}>${formatRadarRateWithCount(row['好人胜率'], row['好人次数'])}</td>
          <td${seatCellClass(rowHighlights[3])}>${formatRadarRateWithCount(row['警徽票正确率'], row['警徽票次数'])}</td>
          <td${seatCellClass(rowHighlights[4])}>${formatRadarRateWithCount(row['放逐票正确率'], row['放逐票次数'])}</td>
        </tr>`;
      }).join('') + (() => {
        const avg = summarizePlayerSeatAverages(rows);
        return `<tr class="radar-seat-summary">
          <td class="col-seat">个人平均</td>
          <td>${avg.场次}</td>
          <td>${formatRadarRateWithCount(avg.狼人胜率, avg.狼人次数)}</td>
          <td>${formatRadarRateWithCount(avg.好人胜率, avg.好人次数)}</td>
          <td>${formatRadarRateWithCount(avg.警徽票正确率, avg.警徽票次数)}</td>
          <td>${formatRadarRateWithCount(avg.放逐票正确率, avg.放逐票次数)}</td>
        </tr>`;
      })();
    }

    function renderRadarGamesSection(name, options = {}) {
      const content = document.getElementById('radarGamesContent');
      if (!hasParticipationData()) {
        content.innerHTML = '<span class="radar-games-empty">暂无参与场次数据</span>';
        return;
      }

      if (!options.skipFilterRefresh) {
        refreshRadarGameFilterOptions(name);
      }
      const banxingFilter = getRadarCheckboxSelection('radarBanxingFilters');
      const identityFilter = getRadarCheckboxSelection('radarIdentityFilters');
      const { participation, wins } = getPlayerGameSessions(name);

      const filtered = sortGameSessions(participation.filter(session =>
        sessionMatchesRadarFilters(session, banxingFilter, identityFilter)
      ));

      if (!filtered.length) {
        content.innerHTML = '<span class="radar-games-empty">暂无匹配场次</span>';
        return;
      }

      content.innerHTML = filtered.map(session => {
        const isWin = wins.has(session.key);
        const rawDate = getRawDateFromSession(session);
        const videoLink = findVideoLink(rawDate);
        const title = videoLink
          ? `打开视频 ${rawDate}`
          : `场次 ${rawDate}`;
        const iconHtml = videoLink ? GAME_SESSION_VIDEO_ICON : '';
        return `<button type="button" class="game-session-chip${isWin ? ' is-win' : ''}" data-raw-date="${escapeHtml(rawDate)}" title="${escapeHtml(title)}"><span class="game-session-chip-text">${formatGameSessionHtml(session)}</span>${iconHtml}</button>`;
      }).join('');
    }

    function getRawDateFromSession(session) {
      const dateStr = String(session.date).trim();
      if (/^\d{10,}$/.test(dateStr)) return dateStr;
      const { day, roundNum } = parseGameDateDisplay(session.date);
      if (day && roundNum > 0) {
        return `${day}${String(roundNum).padStart(2, '0')}`;
      }
      return dateStr;
    }

    let linkMissingToastTimer = null;

    function showLinkMissingToast() {
      const toast = document.getElementById('linkMissingToast');
      if (!toast) return;
      toast.hidden = false;
      toast.classList.add('is-visible');
      clearTimeout(linkMissingToastTimer);
      linkMissingToastTimer = setTimeout(() => {
        toast.classList.remove('is-visible');
        toast.hidden = true;
      }, 2000);
    }

    function openVideoLinkForSession(rawDate) {
      const link = findVideoLink(rawDate);
      if (link) {
        window.open(link, '_blank', 'noopener,noreferrer');
        return;
      }
      showLinkMissingToast();
    }

    function getSortedByAppearance() {
      return getMinAppearanceRows().sort(
        (a, b) => parseValue(b['出场次数'], '出场次数') - parseValue(a['出场次数'], '出场次数')
      );
    }

    function isValidSessionDayKey(day) {
      return /^\d{8}$/.test(String(day ?? '').trim());
    }

    function parseSessionDayKey(sessionDate) {
      const dateStr = String(sessionDate ?? '').trim();
      if (!dateStr) return '';
      if (isValidSessionDayKey(dateStr)) return dateStr;
      const { day } = parseGameDateDisplay(dateStr);
      return isValidSessionDayKey(day) ? day : '';
    }

    function collectSeasonSessionDayKeys() {
      const days = new Set();
      const addDay = (sessionDate) => {
        const day = parseSessionDayKey(sessionDate);
        if (isValidSessionDayKey(day)) days.add(day);
      };

      if (rawTableData.length) {
        rawTableData.forEach(row => addDay(row['日期']));
      } else if (hasParticipationData()) {
        rawData.forEach(player => {
          parseGameSessions(player[PARTICIPATION_COL]).forEach(session => addDay(session.date));
        });
      }

      return [...days].sort((a, b) => Number(a) - Number(b));
    }

    function getSeasonDataDayRange() {
      const days = collectSeasonSessionDayKeys();
      if (!days.length) return null;
      const start = days[0];
      const end = days[days.length - 1];
      if (!isValidSessionDayKey(start) || !isValidSessionDayKey(end)) return null;
      return { start, end };
    }

    function updateDataRangeBar() {
      const bar = document.getElementById('dataRangeBar');
      const textEl = document.getElementById('dataRangeText');
      if (!bar || !textEl) return;

      if (currentView !== 'bar' && currentView !== 'radar') {
        bar.hidden = true;
        return;
      }

      const range = getSeasonDataDayRange();
      if (!range) {
        bar.hidden = true;
        return;
      }

      textEl.textContent = `${range.start}-${range.end}`;
      bar.hidden = false;
    }

    function getUniqueDates() {
      return [...new Set(rawTableData.map(row => String(row['日期'] ?? '')))]
        .filter(Boolean)
        .sort((a, b) => Number(b) - Number(a));
    }

    function refreshTableControls() {
      const dateSelect = document.getElementById('dateSelect');
      const dates = getUniqueDates();
      const prevDate = dateSelect.value;
      dateSelect.innerHTML = dates.map(date =>
        `<option value="${date}">${date}</option>`
      ).join('');
      if (dates.includes(prevDate)) {
        dateSelect.value = prevDate;
      } else if (dates.length) {
        dateSelect.value = dates[0];
      }
    }

    function formatRawTableVideoLinkHtml(rawDate) {
      const date = String(rawDate ?? '').trim();
      const link = findVideoLink(date);
      if (!link) return '';
      return `<a class="raw-table-video-link" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer" title="打开视频" aria-label="打开视频 ${escapeHtml(date)}">${GAME_SESSION_VIDEO_ICON}</a>`;
    }

    function getTableColumns() {
      if (!rawTableData.length) return [];
      const columns = Object.keys(rawTableData[0])
        .filter(col => col !== '日期'
          && !RAW_TABLE_HIDDEN_COLUMNS.has(col)
          && !col.includes('归票'));
      const stickyCols = [NAME_KEY, IDENTITY_KEY].filter(col => columns.includes(col));
      const others = columns.filter(col => !stickyCols.includes(col));
      return [...stickyCols, ...others];
    }

    function getCellClass(col) {
      const classes = [];
      if (col === NAME_KEY) classes.push('col-name');
      if (col === IDENTITY_KEY) classes.push('col-identity');
      if (col.includes('状态')) classes.push('col-state');
      return classes.join(' ');
    }

    function applyStickyColumnOffsets() {
      const nameTh = document.querySelector('.raw-table th.col-name');
      if (!nameTh) return;
      const left = `${nameTh.getBoundingClientRect().width}px`;
      document.querySelectorAll('.raw-table .col-identity').forEach(el => {
        el.style.left = left;
      });
    }

    function setBanxingSubMode(mode) {
      banxingSubMode = mode;
      syncModeButtons('[data-banxing-mode]', 'banxingMode', mode);
      if (currentView === 'banxing') renderBanxingTable();
    }

    const MODE_SETTERS = {
      'wolf-mode': setWolfSubMode,
      'vote-mode': setVoteSubMode,
      'other-mode': setOtherSubMode,
      'skill-mode': setSkillSubMode,
      'winrate-mode': setWinRateSubMode,
      'banxing-mode': setBanxingSubMode,
      'radar-mode': setRadarSubMode,
    };

    function getActiveBanxingData() {
      return totalBanxingData;
    }

    function getBanxingDisplayRows() {
      const types = BANXING_SUB_MODES[banxingSubMode];
      const source = getActiveBanxingData();
      let rows = types
        ? source.filter(row => types.includes(row['版型']))
        : [...source];
      const { column, direction } = banxingSort;
      if (BANXING_SORTABLE.has(column)) {
        rows.sort((a, b) => {
          const av = parseBanxingValue(a[column], column);
          const bv = parseBanxingValue(b[column], column);
          return direction === 'asc' ? av - bv : bv - av;
        });
      } else if (types) {
        const order = new Map(types.map((type, index) => [type, index]));
        rows.sort((a, b) => (order.get(a['版型']) ?? 0) - (order.get(b['版型']) ?? 0));
      } else {
        rows.sort((a, b) => {
          const av = parseBanxingValue(a[column], column);
          const bv = parseBanxingValue(b[column], column);
          return direction === 'asc' ? av - bv : bv - av;
        });
      }
      return rows;
    }

    function parseBanxingValue(value, column) {
      if (column === '狼人胜率' && typeof value === 'string') {
        return parseFloat(value.replace('%', '')) || 0;
      }
      return Number(value) || 0;
    }

    function renderBanxingHeaderCell(col) {
      const thClass = col === '版型' ? 'col-name' : '';
      if (!BANXING_SORTABLE.has(col)) {
        return `<th class="${thClass}">${col}</th>`;
      }
      const isActive = banxingSort.column === col;
      const isAsc = isActive && banxingSort.direction === 'asc';
      const title = isActive ? (isAsc ? '升序，点击切换为降序' : '降序，点击切换为升序') : '点击排序';
      return `<th class="${thClass} th-sortable">
        <div class="th-sort-wrap">
          <span class="th-label">${col}</span>
          <button type="button" class="sort-btn${isActive ? ' active' : ''}" data-col="${col}" title="${title}" aria-label="${title}">${renderSortButtonIcon(isActive, isAsc)}</button>
        </div>
      </th>`;
    }

    function toggleBanxingSort(column) {
      if (banxingSort.column === column) {
        banxingSort.direction = banxingSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        banxingSort = { column, direction: 'desc' };
      }
      renderBanxingTable();
    }

    function bindBanxingSort() {
      document.getElementById('banxingHead').addEventListener('click', (e) => {
        const btn = e.target.closest('.sort-btn');
        if (!btn) return;
        toggleBanxingSort(btn.dataset.col);
      });
    }

    function renderBanxingTable() {
      const sorted = getBanxingDisplayRows();
      const thead = document.getElementById('banxingHead');
      const tbody = document.getElementById('banxingBody');
      const parentLabel = BANXING_PARENT_LABELS[banxingSubMode] || null;

      thead.innerHTML = `<tr>${BANXING_COLUMNS.map(col => renderBanxingHeaderCell(col)).join('')}</tr>`;
      tbody.innerHTML = sorted.map(row => {
        const label = row['版型'];
        const rowClass = parentLabel && label === parentLabel ? ' class="row-banxing-parent"' : '';
        return `<tr${rowClass}>${BANXING_COLUMNS.map(col =>
          `<td class="${col === '版型' ? 'col-name' : ''}">${row[col] ?? ''}</td>`
        ).join('')}</tr>`;
      }).join('');
    }

    function getFirstFieldValue(rows, key) {
      const row = rows.find(item => {
        const value = item[key];
        return value != null && String(value).trim() !== '';
      });
      return row ? String(row[key]).trim() : '—';
    }

    function getRawTableWinClass(winText) {
      const text = String(winText || '');
      if (/狼/.test(text)) return 'is-wolf';
      if (/好|神|民/.test(text)) return 'is-good';
      return '';
    }

    function updateRawTableGameInfo(selectedDate) {
      const infoEl = document.getElementById('rawTableGameInfo');
      const rows = rawTableData.filter(row => String(row['日期']) === selectedDate);
      if (!rows.length) {
        infoEl.innerHTML = '';
        infoEl.hidden = true;
        return;
      }
      const banxing = getFirstFieldValue(rows, BANXING_KEY);
      const win = getFirstFieldValue(rows, WIN_KEY);
      const winClass = getRawTableWinClass(win);
      infoEl.innerHTML = `
        <div class="raw-game-info-inner">
          <div class="raw-game-info-item">
            <span class="raw-game-info-label">版型</span>
            <span class="raw-game-info-value">${escapeHtml(banxing)}</span>
          </div>
          <span class="raw-game-info-divider" aria-hidden="true"></span>
          <div class="raw-game-info-item">
            <span class="raw-game-info-label">胜利</span>
            <span class="raw-game-info-value raw-game-info-win ${winClass}">${escapeHtml(win)}</span>
          </div>
          ${formatRawTableVideoLinkHtml(selectedDate)}
        </div>`;
      infoEl.hidden = false;
    }

    function renderTable() {
      if (rawTableData.length && !document.getElementById('dateSelect').options.length) {
        refreshTableControls();
      }
      const dateSelect = document.getElementById('dateSelect');
      const selectedDate = dateSelect.value;
      updateRawTableGameInfo(selectedDate);
      const filteredData = rawTableData.filter(row => String(row['日期']) === selectedDate);
      const columns = getTableColumns();
      const thead = document.getElementById('tableHead');
      const tbody = document.getElementById('tableBody');

      thead.innerHTML = `<tr>${columns.map(col =>
        `<th class="${getCellClass(col)}">${getRawTableColumnLabel(col)}</th>`
      ).join('')}</tr>`;
      tbody.innerHTML = filteredData.map(row => {
        const rowClass = row[CAMP_KEY] === '狼人' ? ' class="row-wolf"' : '';
        return `<tr${rowClass}>${columns.map(col =>
          `<td class="${getCellClass(col)}">${escapeHtml(String(row[col] ?? ''))}</td>`
        ).join('')}</tr>`;
      }).join('');

      applyStickyColumnOffsets();
    }

    function updateChart() {
      if (currentView === 'banxing') {
        renderBanxingTable();
        return;
      }
      if (currentView === 'table') {
        renderTable();
        return;
      }
      if (currentView === 'tongbian') {
        renderTongbianTable(document.getElementById('tongbianNameSelect').value);
        return;
      }
      if (currentView === 'compare') {
        renderPersonalCompare(
          document.getElementById('compareNameSelect').value,
          document.getElementById('compareMetricSelect').value,
          getCurrentSeriesKey()
        );
        return;
      }
      if (currentView === 'bar') {
        renderChart(document.getElementById('columnSelect').value);
      } else if (currentView === 'radar') {
        const name = document.getElementById('nameSelect').value;
        if (radarSubMode === 'radar') {
          if (!getRadarItemCheckboxes('radarMetricFilters').length) refreshRadarMetricFilters();
          renderRadarChart(name);
        } else if (radarSubMode === 'table') renderRadarPersonalTable(name);
        else if (radarSubMode === 'winrate') renderRadarWinrateChart(name);
        else if (radarSubMode === 'seat') renderRadarSeatSection(name);
        else renderRadarGamesSection(name);
      }
    }

    async function loadBanxingView(seriesKey, { refreshFootnotes = true } = {}) {
      try {
        await loadTotalBanxingData(seriesKey);
        if (refreshFootnotes) updateChartFootnotes();
        updateChart();
      } catch (err) {
        showError(
          `无法加载版型数据：${err.message}<br><br>` +
          `请确认 <strong>${getTotalBanxingFile(seriesKey)}</strong> 存在，并重新运行 statistics.ipynb 导出。`
        );
      }
    }

    async function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn[data-view]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });
      updateSeasonSelect();
      VIEW_PANEL_ROWS.forEach(([id, v]) => $show(id, view === v));
      updateRadarPanelsVisibility();
      VIEW_TABLE_ROWS.forEach(([id, v, display]) => $show(id, view === v, display));
      if (view === 'compare') {
        refreshCompareControls();
        prefetchSeasonStats(getCompareSeasonList(getCurrentSeriesKey()));
        updateDataRangeBar();
        updateChart();
        return;
      }
      if (view === 'banxing') {
        updateDataRangeBar();
        await loadBanxingView(getCurrentSeriesKey());
        return;
      }
      const seriesKey = getCurrentSeriesKey();
      if (!getCompareSeasonList(seriesKey).includes(currentSeason)) {
        await setSeason(getSeriesSeason(seriesKey, null));
      } else {
        try {
          if (view === 'table') {
            await ensureSeasonRaw();
          } else if (view === 'tongbian') {
            await ensureSeasonTongbian();
          }
        } catch (err) {
          showTransientError(`无法加载数据：${err.message}`);
          updateDataRangeBar();
          return;
        }
      }
      if (view === 'table') refreshTableControls();
      else if (view === 'tongbian') refreshControls();
      updateDataRangeBar();
      updateChartFootnotes();
      updateChart();
    }

    function updateSeasonSelect() {
      const seasonEl = $('seasonSelect');
      if (currentView === 'compare' || currentView === 'banxing') {
        seasonEl.innerHTML = '<option value="">—</option>';
        seasonEl.value = '';
        seasonEl.disabled = false;
        seasonEl.removeAttribute('title');
        return;
      }
      refreshSeasonSelectOptions();
      seasonEl.disabled = isRadarSeatView();
      if (isRadarSeatView()) {
        seasonEl.title = '座位号数据为当前系列全部赛季汇总，不可切换赛季';
      } else {
        seasonEl.removeAttribute('title');
      }
    }

    function getBarChartColumns() {
      return RANKING_COLUMNS.filter(col => {
        if (col === SKILL_DATA_KEY) return hasSkillData();
        if (col === WOLF_DATA_KEY) return hasWolfComboData();
        if (col === APPEARANCE_DATA_KEY) return hasAppearanceComboData();
        if (col === VOTE_DATA_KEY) return hasVoteData();
        if (col === WIN_RATE_DATA_KEY) return hasWinRateData();
        if (col === OTHER_DATA_KEY) return hasOtherData();
        return rawData.length > 0 && col in rawData[0];
      });
    }

    function refreshControls() {
      const columns = getBarChartColumns();
      const columnSelect = document.getElementById('columnSelect');
      const prevColumn = columnSelect.value;
      columnSelect.innerHTML = columns.map(col =>
        `<option value="${col}">${col}</option>`
      ).join('');
      if (columns.includes(prevColumn)) columnSelect.value = prevColumn;

      const sortedPlayers = getSortedByAppearance();
      const nameSelect = document.getElementById('nameSelect');
      const prevName = nameSelect.value;
      nameSelect.innerHTML = sortedPlayers.map(item =>
        `<option value="${item[NAME_KEY]}">${item[NAME_KEY]}</option>`
      ).join('');
      if (sortedPlayers.some(item => item[NAME_KEY] === prevName)) {
        nameSelect.value = prevName;
      } else if (sortedPlayers.length) {
        nameSelect.value = sortedPlayers[0][NAME_KEY];
      }

      const tongbianNameSelect = document.getElementById('tongbianNameSelect');
      const prevTongbianName = tongbianNameSelect.value;
      const tongbianNames = getUniqueTongbianNames();
      tongbianNameSelect.innerHTML =
        '<option value="">全部</option>' +
        tongbianNames.map(name =>
          `<option value="${name}">${name}</option>`
        ).join('');
      if (prevTongbianName === '' || tongbianNames.includes(prevTongbianName)) {
        tongbianNameSelect.value = prevTongbianName;
      }

      refreshTableControls();
      refreshCompareControls();
      refreshRadarMetricFilters();
      refreshWinRateSubControls();
      refreshWolfRateBanxingControls();
      refreshOtherSeatControls();
      updateRadarGamesVisibility();
      updateChartFootnotes();
    }

    function renderWinRateDimensionButtons(containerId, attrName, labels, activeLabel) {
      const el = $(containerId);
      if (!labels.length) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = labels.map(label => {
        const active = label === activeLabel ? ' active' : '';
        return `<button type="button" class="filter-mode-btn${active}" data-${attrName}="${escapeHtml(label)}">${escapeHtml(label)}</button>`;
      }).join('');
    }

    function refreshWinRateSubControls() {
      if (!hasWinRateData()) return;

      if (winRateSubMode === 'camp' && !hasWinRateCampData()) {
        winRateSubMode = hasWinRateIdentityData() ? 'identity' : 'banxing';
        syncModeButtons('[data-winrate-mode]', 'winrateMode', winRateSubMode);
      } else if (winRateSubMode === 'identity' && !hasWinRateIdentityData()) {
        winRateSubMode = hasWinRateCampData() ? 'camp' : 'banxing';
        syncModeButtons('[data-winrate-mode]', 'winrateMode', winRateSubMode);
      } else if (winRateSubMode === 'banxing' && !hasWinRateBanxingData()) {
        winRateSubMode = hasWinRateCampData() ? 'camp' : 'identity';
        syncModeButtons('[data-winrate-mode]', 'winrateMode', winRateSubMode);
      }

      if (hasWinRateIdentityData()) {
        const identities = getWinRateIdentityGroupLabels();
        if (!identities.includes(winRateIdentityFilter)) {
          winRateIdentityFilter = identities[0] || '平民';
        }
        renderWinRateDimensionButtons(
          'winRateIdentityControls', 'winrate-identity', identities, winRateIdentityFilter
        );
      } else {
        $('winRateIdentityControls').innerHTML = '';
      }

      if (hasWinRateBanxingData()) {
        const banxings = getWinRateBanxingLabels();
        if (!banxings.includes(winRateBanxingFilter)) {
          winRateBanxingFilter = banxings[0] || '';
        }
        renderWinRateDimensionButtons(
          'winRateBanxingControls', 'winrate-banxing', banxings, winRateBanxingFilter
        );
      } else {
        $('winRateBanxingControls').innerHTML = '';
      }
    }

    function refreshWolfRateBanxingControls() {
      if (!hasWolfRateData()) {
        $('wolfRateBanxingControls').innerHTML = '';
        wolfRateBanxingFilter = WOLF_RATE_BANXING_ALL;
        return;
      }
      const banxings = getWolfRateBanxingLabels();
      if (banxings.length <= 1) {
        $('wolfRateBanxingControls').innerHTML = '';
        wolfRateBanxingFilter = WOLF_RATE_BANXING_ALL;
        return;
      }
      if (!banxings.includes(wolfRateBanxingFilter)) {
        wolfRateBanxingFilter = WOLF_RATE_BANXING_ALL;
      }
      renderWinRateDimensionButtons(
        'wolfRateBanxingControls', 'wolf-rate-banxing', banxings, wolfRateBanxingFilter
      );
    }

    function refreshOtherSeatControls() {
      if (!hasSeatNumberData()) {
        $('otherSeatControls').innerHTML = '';
        return;
      }
      const activeLabel = `${otherSeatFilter}号位`;
      if (!OTHER_SEAT_LABELS.includes(activeLabel)) {
        otherSeatFilter = 1;
      }
      renderWinRateDimensionButtons(
        'otherSeatControls', 'other-seat', OTHER_SEAT_LABELS, `${otherSeatFilter}号位`
      );
    }

    function refreshCompareControls() {
      const compareNameSelect = document.getElementById('compareNameSelect');
      const compareMetricSelect = document.getElementById('compareMetricSelect');
      const seriesKey = getCurrentSeriesKey();
      const prevName = compareNameSelect.value;
      const prevMetric = compareMetricSelect.value;
      const names = getComparePlayerNames(seriesKey);
      const metrics = getCompareColumns(seriesKey);

      compareNameSelect.innerHTML = names.map(n =>
        `<option value="${n}">${n}</option>`
      ).join('');
      if (names.includes(prevName)) compareNameSelect.value = prevName;

      compareMetricSelect.innerHTML = metrics.map(col =>
        `<option value="${col}">${formatColumnLabel(col)}</option>`
      ).join('');
      if (metrics.includes(prevMetric)) {
        compareMetricSelect.value = prevMetric;
      } else if (metrics.includes('总胜率')) {
        compareMetricSelect.value = '总胜率';
      }
    }

    function bindUiOnce() {
      if (uiBound) return;
      uiBound = true;
      bindRulesModal();
      bindTongbianSessionsModal();
      bindScreenshotButton();
      $('columnSelect').addEventListener('change', async () => {
        updateChartFootnotes();
        try {
          if (currentView === 'bar'
            && $('columnSelect').value === WOLF_DATA_KEY
            && wolfSubMode === 'lagan') {
            await ensureSeasonRaw();
          }
          if (currentView === 'table') refreshTableControls();
          updateChart();
        } catch (err) {
          showTransientError(`无法加载原始数据：${err.message}`);
        }
      });
      MODE_BUTTON_BINDINGS.forEach(([attr, dataKey]) => {
        document.querySelectorAll(`.wolf-mode-btn[data-${attr}]`).forEach(btn => {
          btn.addEventListener('click', () => MODE_SETTERS[attr](btn.dataset[dataKey]));
        });
      });
      $('wolfRateBanxingControls').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-wolf-rate-banxing]');
        if (!btn) return;
        setWolfRateBanxingFilter(readFilterButtonLabel(btn, 'wolf-rate-banxing'));
      });
      $('barControls').addEventListener('click', (e) => {
        const identityBtn = e.target.closest('[data-winrate-identity]');
        if (identityBtn) {
          setWinRateIdentityFilter(identityBtn.dataset.winrateIdentity);
          return;
        }
        const banxingBtn = e.target.closest('[data-winrate-banxing]');
        if (banxingBtn) {
          setWinRateBanxingFilter(banxingBtn.dataset.winrateBanxing);
          return;
        }
        const seatBtn = e.target.closest('[data-other-seat]');
        if (seatBtn) {
          setOtherSeatFilter(seatBtn.dataset.otherSeat);
        }
      });
      $('radarWinrateControls').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-radar-winrate-dim]');
        if (btn) setRadarWinrateDim(btn.dataset.radarWinrateDim);
      });
      $('nameSelect').addEventListener('change', updateChart);
      $('radarMetricFilters').addEventListener('change', handleRadarMetricFilterChange);
      $('radarGameFilters').addEventListener('change', (e) => {
        if (e.target.type !== 'checkbox' || currentView !== 'radar') return;
        if (e.target.classList.contains('radar-filter-all-cb')) {
          const containerId = e.target.dataset.filterGroup;
          const checked = e.target.checked;
          getRadarItemCheckboxes(containerId).forEach(cb => { cb.checked = checked; });
        } else if (e.target.classList.contains('radar-filter-item-cb')) {
          const container = e.target.closest('.radar-filter-checkboxes');
          if (container) syncRadarSelectAllCheckbox(container.id);
        }
        renderRadarGamesSection($('nameSelect').value, { skipFilterRefresh: true });
      });
      $('radarGamesContent').addEventListener('click', (e) => {
        const chip = e.target.closest('button.game-session-chip[data-raw-date]');
        if (!chip) return;
        openVideoLinkForSession(chip.dataset.rawDate);
      });
      $('laganBody').addEventListener('click', (e) => {
        const row = e.target.closest('tr[data-raw-date]');
        if (!row) return;
        openVideoLinkForSession(row.dataset.rawDate);
      });
      $('tongbianBody').addEventListener('click', (e) => {
        const row = e.target.closest('tr[data-tongbian-row]');
        if (!row) return;
        const index = Number(row.dataset.tongbianRow);
        if (!Number.isFinite(index) || !tongbianRenderedRows[index]) return;
        openTongbianSessionsModal(tongbianRenderedRows[index]);
      });
      $('tongbianNameSelect').addEventListener('change', updateChart);
      $('seriesSelect').addEventListener('change', async () => {
        const seriesKey = getCurrentSeriesKey();
        await loadSeatNumberStats(seriesKey, { force: true });
        if (currentView === 'compare') {
          refreshCompareControls();
          updateChart();
          return;
        }
        if (currentView === 'banxing') {
          await loadBanxingView(seriesKey, { refreshFootnotes: false });
          return;
        }
        refreshSeasonSelectOptions();
        await setSeason(getSeriesSeason(seriesKey, null));
        if (currentView === 'radar' && radarSubMode === 'seat') {
          renderRadarSeatSection($('nameSelect').value);
        }
      });
      $('compareNameSelect').addEventListener('change', updateChart);
      $('compareMetricSelect').addEventListener('change', updateChart);
      $('dateSelect').addEventListener('change', renderTable);
      document.querySelectorAll('.view-btn[data-view]').forEach(btn => {
        btn.addEventListener('click', () => setView(btn.dataset.view));
      });
      $('seasonSelect').addEventListener('change', (e) => {
        const season = e.target.value;
        if (!season || currentView === 'compare' || currentView === 'banxing' || isRadarSeatView()) return;
        setSeason(season);
      });
      bindBanxingSort();
      bindTongbianSort();
    }

    function showError(message) {
      $show('error', true, 'block');
      $('error').innerHTML = message;
      $('chart').style.display = 'none';
      document.querySelector('.toolbar').style.display = 'none';
    }

    function showTransientError(message) {
      const errEl = $('error');
      errEl.innerHTML = message;
      $show('error', true, 'block');
      $('chart').style.display = '';
      document.querySelector('.toolbar').style.display = '';
      clearTimeout(transientErrorTimer);
      transientErrorTimer = setTimeout(() => {
        $show('error', false);
      }, 6000);
    }

    function validateSeasonStats(stats, files) {
      const normalizedStats = normalizePlayerStatsColumns(stats);
      if (!Array.isArray(normalizedStats) || normalizedStats.length === 0) {
        throw new Error(`${files.stats} 数据为空或格式不正确`);
      }
      return normalizedStats;
    }

    function validateSeasonBanxing(banxing, files) {
      if (!Array.isArray(banxing) || banxing.length === 0) {
        throw new Error(`${files.banxing} 数据为空或格式不正确`);
      }
    }

    function needsSeasonExtraLoad(season, options = getSeasonLoadOptions()) {
      const cached = seasonPayloadCache[season];
      if (options.raw && !cached?.rawTable?.length) return true;
      if (options.tongbian && !cached?.tongbian?.length) return true;
      return false;
    }

    function getSeasonLoadOptions() {
      return {
        raw: currentView === 'table'
          || (currentView === 'bar' && $('columnSelect')?.value === WOLF_DATA_KEY && wolfSubMode === 'lagan'),
        tongbian: currentView === 'tongbian',
      };
    }

    function applySeasonPayload(payload) {
      seasonStats[payload.season] = payload.stats;
      rawData = payload.stats;
      rawTableData = payload.rawTable || [];
      banxingData = payload.banxing || [];
      tongbianData = payload.tongbian || [];
      currentSeason = payload.season;
      seasonPayloadCache[payload.season] = payload;
      updateDataRangeBar();
    }

    function getParticipationSessionIds(season = currentSeason) {
      const sessions = new Set();
      const rows = seasonStats[season]?.length
        ? seasonStats[season]
        : (season === currentSeason ? rawData : []);
      if (!rows.length || !(PARTICIPATION_COL in rows[0])) return sessions;
      rows.forEach(player => {
        parseGameSessions(player[PARTICIPATION_COL]).forEach(session => {
          const id = String(session.date ?? '').trim();
          if (id) sessions.add(id);
        });
      });
      return sessions;
    }

    function getRawTableSessionIds(rawTable = rawTableData) {
      return new Set(rawTable.map(row => String(row['日期'] ?? '')).filter(Boolean));
    }

    function isSeasonRawStale(season) {
      const cached = seasonPayloadCache[season];
      if (!cached?.rawTable?.length) return false;
      const participationIds = getParticipationSessionIds(season);
      if (!participationIds.size) return false;
      const rawIds = getRawTableSessionIds(cached.rawTable);
      if (rawIds.size < participationIds.size) return true;
      for (const id of participationIds) {
        if (!rawIds.has(id)) return true;
      }
      return false;
    }

    function dropSeasonRawCache(season) {
      delete seasonExtraPromises[`${season}:raw`];
      jsonFetchCache.delete(getSeasonFiles(season).raw);
      const cached = seasonPayloadCache[season];
      if (cached) cached.rawTable = [];
      if (season === currentSeason) rawTableData = [];
    }

    function getStatsParticipationFingerprint(stats) {
      if (!Array.isArray(stats) || !stats.length) return '';
      let sessionCount = 0;
      let maxDate = '';
      stats.forEach(row => {
        parseGameSessions(row[PARTICIPATION_COL]).forEach(session => {
          sessionCount += 1;
          const date = String(session.date ?? '').trim();
          if (date && date > maxDate) maxDate = date;
        });
      });
      return `${stats.length}:${sessionCount}:${maxDate}`;
    }

    function invalidateSeasonExtraIfStatsChanged(season, prevStats, nextStats) {
      const prevFingerprint = getStatsParticipationFingerprint(prevStats);
      const nextFingerprint = getStatsParticipationFingerprint(nextStats);
      if (!prevFingerprint || prevFingerprint === nextFingerprint) return;
      dropSeasonRawCache(season);
      delete seasonExtraPromises[`${season}:tongbian`];
      jsonFetchCache.delete(getSeasonFiles(season).tongbian);
      const cached = seasonPayloadCache[season];
