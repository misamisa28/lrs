      if (cached) cached.tongbian = [];
      if (season === currentSeason) tongbianData = [];
    }

    async function loadSeasonExtraFile(season, kind) {
      const key = `${season}:${kind}`;
      if (seasonExtraPromises[key]) return seasonExtraPromises[key];

      seasonExtraPromises[key] = (async () => {
        const files = getSeasonFiles(season);
        if (kind === 'raw') {
          const rawTable = normalizeRawTableColumns(await fetchJsonWithRetry(files.raw));
          if (!Array.isArray(rawTable) || rawTable.length === 0) {
            throw new Error(`${files.raw} 数据为空或格式不正确`);
          }
          const cached = seasonPayloadCache[season] || {
            season,
            stats: seasonStats[season] || [],
            banxing: [],
            rawTable: [],
            tongbian: [],
          };
          cached.rawTable = rawTable;
          seasonPayloadCache[season] = cached;
          if (season === currentSeason) rawTableData = rawTable;
          updateDataRangeBar();
          return rawTable;
        }

        const tongbian = await fetchJsonWithRetry(files.tongbian);
        if (!Array.isArray(tongbian)) {
          throw new Error(`${files.tongbian} 格式不正确（应为 JSON 数组）`);
        }
        const cached = seasonPayloadCache[season] || {
          season,
          stats: seasonStats[season] || [],
          banxing: [],
          rawTable: [],
          tongbian: [],
        };
        cached.tongbian = tongbian;
        seasonPayloadCache[season] = cached;
        if (season === currentSeason) tongbianData = tongbian;
        return tongbian;
      })();

      try {
        return await seasonExtraPromises[key];
      } catch (err) {
        delete seasonExtraPromises[key];
        throw err;
      }
    }

    async function ensureSeasonRaw(season = currentSeason) {
      if (isSeasonRawStale(season)) {
        dropSeasonRawCache(season);
      }
      const cached = seasonPayloadCache[season];
      if (cached?.rawTable?.length) {
        if (season === currentSeason) rawTableData = cached.rawTable;
        return cached.rawTable;
      }
      return loadSeasonExtraFile(season, 'raw');
    }

    async function ensureSeasonTongbian(season = currentSeason) {
      const cached = seasonPayloadCache[season];
      if (cached?.tongbian?.length) {
        if (season === currentSeason) tongbianData = cached.tongbian;
        return cached.tongbian;
      }
      return loadSeasonExtraFile(season, 'tongbian');
    }

    async function loadSeasonStatsOnly(season) {
      const files = getSeasonFiles(season);
      const stats = normalizePlayerStatsColumns(await fetchJson(files.stats, { force: true }));
      if (!Array.isArray(stats) || stats.length === 0) {
        throw new Error(`${files.stats} 数据为空或格式不正确`);
      }
      seasonStats[season] = stats;
      return stats;
    }

    async function prefetchSeasonStats(seasons = SEASONS) {
      await Promise.allSettled(seasons.map(season => loadSeasonStatsOnly(season)));
    }

    async function loadSeasonData(season, options = {}) {
      const { raw = false, tongbian = false } = options;
      const files = getSeasonFiles(season);
      const prevStats = seasonPayloadCache[season]?.stats;

      const [stats, banxing] = await Promise.all([
        fetchJsonWithRetry(files.stats, 1, { force: true }).then(rows => normalizePlayerStatsColumns(rows)),
        fetchJsonWithRetry(files.banxing, 1, { force: true }),
      ]);

      const normalizedStats = validateSeasonStats(stats, files);
      validateSeasonBanxing(banxing, files);
      invalidateSeasonExtraIfStatsChanged(season, prevStats, normalizedStats);
      seasonStats[season] = normalizedStats;

      const prev = seasonPayloadCache[season];
      seasonPayloadCache[season] = {
        season,
        stats: normalizedStats,
        banxing,
        rawTable: prev?.rawTable || [],
        tongbian: prev?.tongbian || [],
      };

      const extraTasks = [];
      if (raw) extraTasks.push(ensureSeasonRaw(season));
      if (tongbian) extraTasks.push(ensureSeasonTongbian(season));
      if (extraTasks.length) await Promise.all(extraTasks);

      return seasonPayloadCache[season];
    }

    async function loadSeatNumberStats(seriesKey, { force = false } = {}) {
      if (!force && seatNumberStatsCache[seriesKey]) {
        seatNumberStatsData = seatNumberStatsCache[seriesKey];
        return seatNumberStatsData;
      }
      const file = getSeatNumberStatsFile(seriesKey);
      try {
        const rows = await fetchJsonWithRetry(file, 1, { force });
        seatNumberStatsCache[seriesKey] = Array.isArray(rows) ? rows : [];
      } catch (_) {
        seatNumberStatsCache[seriesKey] = [];
      }
      seatNumberStatsData = seatNumberStatsCache[seriesKey];
      return seatNumberStatsData;
    }

    async function loadTotalBanxingData(seriesKey) {
      const file = getTotalBanxingFile(seriesKey);
      totalBanxingData = await fetchJson(file);
      if (!Array.isArray(totalBanxingData) || totalBanxingData.length === 0) {
        throw new Error(`${file} 数据为空或格式不正确`);
      }
    }

    async function setSeason(season) {
      if (!SEASONS.includes(season)) return;

      const seq = ++seasonLoadSeq;

      const seasonEl = $('seasonSelect');
      seasonEl.disabled = true;

      try {
        const payload = await loadSeasonData(season, getSeasonLoadOptions());
        if (seq !== seasonLoadSeq) return;

        applySeasonPayload(payload);
        $show('error', false);
        updateSeasonSelect();
        refreshControls();
        updateChart();
      } catch (err) {
        if (seq !== seasonLoadSeq) return;
        $('seasonSelect').value = currentSeason;
        const files = getSeasonFiles(season);
        showTransientError(
          `无法加载 ${season} 数据：${err.message}<br>` +
          `请确认 <strong>${files.stats}</strong>、<strong>${files.banxing}</strong> 等数据文件存在。`
        );
        updateChart();
      } finally {
        if (seq === seasonLoadSeq) {
          seasonEl.disabled = isRadarSeatView();
        }
      }
    }

    async function initApp() {
      try {
        chart = echarts.init(document.getElementById('chart'));
        bindUiOnce();
        document.getElementById('seriesSelect').value = DEFAULT_SERIES_KEY;
        refreshSeasonSelectOptions();
        applySeasonPayload(await loadSeasonData(DEFAULT_SEASON));
        await loadSeatNumberStats(getCurrentSeriesKey());
        updateSeasonSelect();
        refreshControls();
        updateChart();
        loadVideoLinks().then(() => {
          if (currentView === 'table') {
            renderTable();
          }
          if (currentView === 'radar' && radarSubMode === 'games') {
            renderRadarGamesSection($('nameSelect').value, { skipFilterRefresh: true });
          }
          if (currentView === 'bar' && $('columnSelect').value === WOLF_DATA_KEY && wolfSubMode === 'lagan') {
            renderLaganTable();
          }
          if (currentTongbianModalRow) {
            renderTongbianSessionsModalContent(currentTongbianModalRow);
          }
        });

        const otherSeasons = SEASONS.filter(season => season !== DEFAULT_SEASON);
        prefetchSeasonStats(otherSeasons);

        window.addEventListener('resize', () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            if (currentView === 'table') applyStickyColumnOffsets();
            else if (currentView === 'tongbian') applyTongbianStickyOffsets();
            else updateChart();
          }, 150);
        });
      } catch (err) {
        const files = getSeasonFiles(DEFAULT_SEASON);
        showError(
          `无法加载数据：${err.message}<br><br>` +
          `请确认 <strong>${files.stats}</strong>、<strong>${files.banxing}</strong> 存在，并在本目录启动本地服务器后访问，例如：<br>` +
          `<code>python -m http.server 8080</code><br>` +
          `然后打开 <code>http://localhost:8080/index.html</code>`
        );
      }
    }

    initApp();
  </script>
</body>
