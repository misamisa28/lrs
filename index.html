  <script>
    const SEASON_PREFIX = {
      S20: '京城大师赛',
      S21: '京城大师赛',
      S22: '京城大师赛',
      S1: '粤小',
      S2: '粤小',
    };
    const SEASONS = ['S20','S21', 'S22', 'S1', 'S2'];
    const DEFAULT_SEASON = 'S22';
    const DEFAULT_SERIES_KEY = 'jingcheng';
    const COMPARE_SERIES = {
      jingcheng: { label: '京城大师赛', seasons: ['S20','S21', 'S22'] },
      yuexiao: { label: '粤小', seasons: ['S1', 'S2'] },
    };
    const SERIES_DEFAULT_SEASON = { jingcheng: 'S22', yuexiao: 'S2' };

    function getSeasonTag(season) {
      const prefix = SEASON_PREFIX[season];
      return prefix ? `${prefix}${season}` : season;
    }

    const DATA_DIR = 'data';
    const RULES_FILE = '规则.json';
    const VIDEO_LINKS_FILE = `${DATA_DIR}/链接.json`;
    const PAGE_LOAD_NONCE = Date.now();

    function getSeasonFiles(season) {
      const tag = getSeasonTag(season);
      return {
        stats: `${DATA_DIR}/${tag}玩家统计.json`,
        raw: `${DATA_DIR}/${tag}原始数据.json`,
        banxing: `${DATA_DIR}/${tag}版型数据.json`,
        tongbian: `${DATA_DIR}/${tag}同边数据.json`,
      };
    }

    function getSeriesTag(seriesKey) {
      const seasons = COMPARE_SERIES[seriesKey]?.seasons || [];
      return seasons.length ? SEASON_PREFIX[seasons[0]] : '';
    }

    function getTotalBanxingFile(seriesKey) {
      const tag = getSeriesTag(seriesKey);
      return `${DATA_DIR}/${tag}总版型数据.json`;
    }

    function getSeatNumberStatsFile(seriesKey) {
      const tag = getSeriesTag(seriesKey);
      return `${DATA_DIR}/${tag}座位号数据统计.json`;
    }

    let rulesDocumentCache = null;

    function renderRulesString(value) {
      return `<span class="rules-value">${escapeHtml(value)}</span>`;
    }

    function renderRulesEntry(key, item) {
      if (typeof item === 'string') {
        return `<div class="rules-kv"><span class="rules-term">${escapeHtml(key)}</span>${renderRulesString(item)}</div>`;
      }
      return `<div class="rules-subblock"><div class="rules-subblock-head">${escapeHtml(key)}</div><div class="rules-subblock-body">${renderRulesValue(item)}</div></div>`;
    }

    function renderRulesValue(value) {
      if (value == null) return '';
      if (typeof value === 'string') {
        return `<p class="rules-text">${renderRulesString(value)}</p>`;
      }
      if (Array.isArray(value)) {
        return `<ul class="rules-list">${value.map(item =>
          `<li>${escapeHtml(String(item))}</li>`
        ).join('')}</ul>`;
      }
      if (typeof value === 'object') {
        const entries = Object.entries(value);
        const useGrid = entries.length > 1 && entries.every(([, item]) => typeof item === 'string');
        return `<div class="rules-kv-wrap${useGrid ? ' is-grid' : ''}">${entries.map(([key, item]) =>
          renderRulesEntry(key, item)
        ).join('')}</div>`;
      }
      return '';
    }

    const RULES_HIDDEN_SECTIONS = new Set(['说明', '数据来源与处理流程', '原始数据导出', '角色常量']);

    function renderRulesDocument(rules) {
      let html = '<div class="rules-sections">';
      Object.entries(rules).forEach(([section, content]) => {
        if (RULES_HIDDEN_SECTIONS.has(section)) return;
        html += `<section class="rules-section"><h3 class="rules-section-title">${escapeHtml(section)}</h3><div class="rules-section-body">${renderRulesValue(content)}</div></section>`;
      });
      html += '</div>';
      return html;
    }

    async function loadRulesDocument() {
      if (rulesDocumentCache) return rulesDocumentCache;
      rulesDocumentCache = await fetchJson(RULES_FILE);
      return rulesDocumentCache;
    }

    function setRulesModalOpen(open) {
      const modal = document.getElementById('rulesModal');
      modal.classList.toggle('is-open', open);
      modal.setAttribute('aria-hidden', open ? 'false' : 'true');

    let pendingChartImageUrl = null;

    async function dataUrlToBlobUrl(dataUrl) {
      try {
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        return URL.createObjectURL(blob);
      } catch {
        return dataUrl;
      }
    }

    async function waitForScreenshotImage(img) {
      if (img.complete && img.naturalWidth > 0) return;
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('图表图片加载超时')), 8000);
        img.onload = () => {
          clearTimeout(timer);
          resolve();
        };
        img.onerror = () => {
          clearTimeout(timer);
          reject(new Error('图表图片加载失败'));
        };
      });
    }

    async function prepareChartOverlayForScreenshot(screenshotScale) {
      if (!isChartVisibleForScreenshot()) return () => {};

      const chartEl = chart.getDom();
      chart.resize();
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      chart.resize();

      const dataUrl = chart.getDataURL({
        type: 'png',
        pixelRatio: screenshotScale,
        backgroundColor: '#ffffff',
      });
      const imageUrl = await dataUrlToBlobUrl(dataUrl);
      pendingChartImageUrl = imageUrl;

      const restores = [];

      Array.from(chartEl.children).forEach(child => {
        const prev = child.style.visibility;
        child.style.visibility = 'hidden';
        restores.push(() => { child.style.visibility = prev; });
      });

      const prevPosition = chartEl.style.position;
      if (!prevPosition || prevPosition === 'static') {
        chartEl.style.position = 'relative';
        restores.push(() => { chartEl.style.position = prevPosition; });
      }

      const logicalW = chart.getWidth();
      const logicalH = chart.getHeight();

      const overlay = document.createElement('img');
      overlay.className = 'chart-screenshot-overlay';
      overlay.src = imageUrl;
      overlay.alt = '';
      overlay.setAttribute('aria-hidden', 'true');
      overlay.style.cssText = [
        'position:absolute',
        'left:0',
        'top:0',
        `width:${logicalW}px`,
        `height:${logicalH}px`,
        'display:block',
        'object-fit:fill',
        'z-index:1',
        'pointer-events:none',
        'border:none',
        'margin:0',
        'padding:0',
        'box-sizing:border-box',
      ].join(';');

      chartEl.appendChild(overlay);
      await waitForScreenshotImage(overlay);

      restores.push(() => {
        overlay.remove();
        if (imageUrl !== dataUrl) URL.revokeObjectURL(imageUrl);
        pendingChartImageUrl = null;
        if (chart && !chart.isDisposed()) chart.resize();
      });

      return () => restores.reverse().forEach(restore => restore());
    }

    function prepareScreenshotClone(clonedDoc) {
      const clientWidth = document.documentElement.clientWidth;
      const scrollWidth = document.documentElement.scrollWidth;

      if (scrollWidth > clientWidth + 1) {
        clonedDoc.documentElement.style.width = `${clientWidth}px`;
        clonedDoc.body.style.width = `${clientWidth}px`;
        clonedDoc.body.style.maxWidth = `${clientWidth}px`;
      }

      clonedDoc.body.style.webkitTextSizeAdjust = '100%';
      clonedDoc.body.style.textSizeAdjust = '100%';

      const viewportMeta = clonedDoc.querySelector('meta[name="viewport"]');
      if (viewportMeta) {
        viewportMeta.setAttribute('content', `width=${clientWidth}, initial-scale=1`);
      }

      const actions = clonedDoc.querySelector('.header-actions');
      if (actions) actions.style.visibility = 'hidden';

      const modal = clonedDoc.getElementById('rulesModal');
      if (modal) modal.style.display = 'none';

      fixPageMetaBarForScreenshot(clonedDoc);
      injectChartImageInClone(clonedDoc);

      document.querySelectorAll('select').forEach(liveSelect => {
        if (isScreenshotVisible(liveSelect)) {
          replaceSelectForScreenshot(clonedDoc, liveSelect);

          if (cloneSelect) cloneSelect.style.display = 'none';

    async function captureFullscreenScreenshot() {
      if (typeof html2canvas !== 'function') {
        showTransientError('截图组件未加载，请检查网络后刷新页面。');
        return;
      }

      const btn = $('screenshotBtn');
      btn.disabled = true;
      btn.classList.add('is-busy');

      const scrollX = window.scrollX;
      const scrollY = window.scrollY;
      let restoreLiveDom = null;
      let restoreChartOverlay = null;

      try {
        window.scrollTo(0, 0);
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const scale = getScreenshotScale();
        restoreChartOverlay = await prepareChartOverlayForScreenshot(scale);
        restoreLiveDom = await prepareLiveDomForScreenshot();

        const canvas = await html2canvas(document.body, {
          backgroundColor: getComputedStyle(document.body).backgroundColor,
          scale,
          useCORS: true,
          allowTaint: true,
          foreignObjectRendering: false,
          logging: false,
          scrollX: 0,
          scrollY: 0,
          windowWidth: document.documentElement.clientWidth,
          windowHeight: window.innerHeight,
          onclone: prepareScreenshotClone,
        });

        const link = document.createElement('a');
        link.download = getScreenshotFilename();
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        showTransientError(`截图失败：${err.message}`);
      } finally {
        pendingChartImageUrl = null;
        restoreChartOverlay?.();
        restoreLiveDom?.();
        window.scrollTo(scrollX, scrollY);
        btn.disabled = false;
        btn.classList.remove('is-busy');
      }
    }

    function bindScreenshotButton() {
      $('screenshotBtn').addEventListener('click', captureFullscreenScreenshot);
    }

    function withCacheBust(url) {
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}v=${PAGE_LOAD_NONCE}`;
    }

    async function fetchJson(url, { force = false } = {}) {
      const requestUrl = withCacheBust(url);
      const cacheKey = requestUrl.split('?')[0];
      if (!force && jsonFetchCache.has(cacheKey)) {
        return jsonFetchCache.get(cacheKey);
      }

      const request = (async () => {
        const res = await fetch(requestUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error(`${url} HTTP ${res.status}`);
        return res.json();
      })();

      if (!force) jsonFetchCache.set(cacheKey, request);

      try {
        const data = await request;
        if (!force) jsonFetchCache.set(cacheKey, Promise.resolve(data));
        return data;
      } catch (err) {
        if (!force) jsonFetchCache.delete(cacheKey);
        throw err;
      }
    }

    async function fetchJsonWithRetry(url, retries = 1, { force = false } = {}) {
      let lastErr;
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          return await fetchJson(url, { force });
        } catch (err) {
          lastErr = err;
          if (attempt < retries) {
            await new Promise(resolve => setTimeout(resolve, 180 * (attempt + 1)));
          }
        }
      }
      throw lastErr;
    }

    function normalizePlayerStatsColumns(rows) {
      if (!Array.isArray(rows)) return rows;
      return rows.map(row => {
        const next = { ...row };
        for (const [oldKey, newKey] of Object.entries(PLAYER_STATS_COLUMN_RENAMES)) {
          if (oldKey === newKey) continue;
          if (oldKey in next && !(newKey in next)) {
            next[newKey] = next[oldKey];
          }
          if (oldKey in next) delete next[oldKey];
        }
        if (!(VOTE_NO_PROPHET_EXILE_RATE in next)
          && VOTE_NO_PROPHET_EXILE_COUNT in next
          && VOTE_NO_PROPHET_EXILE_CORRECT_COUNT in next) {
          const count = Number(next[VOTE_NO_PROPHET_EXILE_COUNT]) || 0;
          const correct = Number(next[VOTE_NO_PROPHET_EXILE_CORRECT_COUNT]) || 0;
          next[VOTE_NO_PROPHET_EXILE_RATE] = count > 0
            ? `${(correct / count * 100).toFixed(1)}%`
            : '0.0%';
        }
        return next;
      });
    }

    function getBarPeakValue(items, getValue = (item) => item.value) {
      if (!items.length) return 0;
      return Math.max(...items.map(item => Number(getValue(item)) || 0));
    }

    function estimateRightLabelWidth(options = {}) {
      const mobile = isMobile();
      const { isPercent = false, peak = 0, maxCount = 0 } = options;
      if (isPercent) {
        const text = formatPercent(peak) + (maxCount > 0 ? `（${maxCount}）` : '');
        const charWidth = mobile ? 5.2 : 6.2;
        return Math.ceil(text.length * charWidth + 2);
      }
      const text = String(Math.round(maxCount || peak || 0));
      return Math.ceil(text.length * (mobile ? 6.5 : 7.5) + 2);
    }

    function getBarPlotWidth(layout) {
      const chartEl = document.getElementById('chart');
      const chartWidth = chartEl?.clientWidth ?? window.innerWidth;
      const sideReserve = isMobile() ? 76 : 96;
      return Math.max(100, chartWidth - sideReserve - layout.gridRight);
    }

    function getBarValueAxisLayout(items, layout, options = {}) {
      const {
        isPercent = false,
        labelIsPercent = isPercent,
        showRightLabel = false,
        labelExtraWidth = 0,
        getPeak = null,
        labelPeak = null,
        labelMaxCount = null,
      } = options;
      const mobile = isMobile();
      const peak = getPeak ? getPeak(items) : getBarPeakValue(items);
      let max;
      let gridRight = layout.gridRight;

      if (peak <= 0) {
        return { max, gridRight };
      }

      if (showRightLabel) {
        const labelValuePeak = labelPeak ?? peak;
        const labelCountPeak = labelMaxCount ?? (labelIsPercent ? 0 : Math.round(peak));
        const labelWidth = Math.max(
          labelExtraWidth,
          estimateRightLabelWidth({ isPercent: labelIsPercent, peak: labelValuePeak, maxCount: labelCountPeak })
        );
        const plotWidth = getBarPlotWidth(layout);

        if (mobile) {
          const fitMax = peak * plotWidth / Math.max(plotWidth - labelWidth, 60);
          max = isPercent
            ? Math.min(120, Math.ceil(fitMax * 10) / 10)
            : Math.ceil(fitMax);
        } else {
          max = isPercent
            ? Math.min(100, Math.ceil(peak * 10) / 10)
            : Math.max(Math.ceil(peak), 1);
          gridRight = Math.max(layout.gridRight, labelWidth + 4);
        }
        return { max, gridRight };
      }

      if (isPercent) {
        max = Math.min(100, Math.ceil(peak * 1.01 * 10) / 10);
      } else {
        max = Math.max(Math.ceil(peak * 10) / 10, 1);
      }
      return { max, gridRight };
    }

    function hasVisibleRightBarLabel(option) {
      const seriesList = Array.isArray(option.series) ? option.series : (option.series ? [option.series] : []);
      return seriesList.some((series) => series?.label?.show && series?.label?.position === 'right');
    }

    function finalizeBarChartOption(option, items, layout, axisOptions = {}) {
      const resolvedOptions = {
        ...axisOptions,
        showRightLabel: axisOptions.showRightLabel ?? hasVisibleRightBarLabel(option),
      };
      const axisLayout = getBarValueAxisLayout(items, layout, resolvedOptions);
      if (option.grid) {
        option.grid.right = Math.max(option.grid.right ?? layout.gridRight, axisLayout.gridRight);
      }
      if (option.xAxis && axisLayout.max != null) {
        option.xAxis.max = axisLayout.max;
        if (axisOptions.isPercent && axisLayout.max > 100 && option.xAxis.axisLabel) {
          const baseFormatter = option.xAxis.axisLabel.formatter;
          option.xAxis.axisLabel.formatter = (value) => {
            if (value > 100) return '';
            if (typeof baseFormatter === 'function') return baseFormatter(value);
            if (baseFormatter && baseFormatter !== '{value}') {
              return String(baseFormatter).replace('{value}', value);
            }
            return formatPercent(value);
          };
        }
      }
      if (resolvedOptions.showRightLabel && option.series && !isMobile()) {
        const seriesList = Array.isArray(option.series) ? option.series : [option.series];
        seriesList.forEach((series) => {
          if (series?.label?.position === 'right' && series.label.show !== false) {
            series.clip = false;
          }
        });
      }
      return option;
    }

    function buildChartLegend(data, layout) {
      const legend = {
        data,
        bottom: layout.legendBottom,
        itemWidth: layout.legendItemWidth,
        itemHeight: layout.legendItemHeight,
        itemGap: layout.legendItemGap,
        textStyle: { color: CHART_TEXT, fontSize: layout.legendFontSize },
      };
      if (isMobile() && data.length > 3) {
        legend.type = 'scroll';
        legend.width = '90%';
        legend.pageIconSize = 10;
        legend.pageTextStyle = { fontSize: layout.legendFontSize };
      }
      return legend;
    }

    function getBarSeriesLayout(layout) {
      return {
        barMaxWidth: layout.barMaxWidth,
        barCategoryGap: layout.barCategoryGap,
        barGap: layout.barGap,
      };
    }

    function getCompareChartGrid(layout) {
      const mobile = isMobile();
      const pad = mobile ? 28 : 36;
      return {
        left: mobile ? 8 : 12,
        right: mobile ? 12 : 20,
        top: pad,
        bottom: pad + layout.legendReserve,
        containLabel: true,
      };
    }

    function setCompareChartHeight() {
      const el = document.getElementById('chart');
      if (isMobile()) {
        el.style.height = `${Math.max(300, Math.min(window.innerHeight - 280, 360))}px`;
      } else {
        el.style.height = `${Math.min(460, Math.max(380, window.innerHeight * 0.42))}px`;
      }
    }

    function getCompareYAxisRange(values, metric) {
      const nums = values.filter(v => v != null && Number.isFinite(Number(v))).map(Number);
      if (!nums.length) {
        return metric.includes('率') ? { min: 0, max: 100 } : {};
      }

      const dataMin = Math.min(...nums);
      const dataMax = Math.max(...nums);
      const span = Math.max(dataMax - dataMin, 0);
      const isRate = metric.includes('率');
      const pad = Math.max(span * 0.15, isRate ? 3 : Math.max(span * 0.1, 0.5));

      let min = dataMin - pad;
      let max = dataMax + pad;

      if (isRate) {
        min = Math.max(0, Math.floor(min * 10) / 10);
        max = Math.min(100, Math.ceil(max * 10) / 10);
        if (max - min < 10) {
          const mid = (dataMin + dataMax) / 2;
          min = Math.max(0, Math.floor((mid - 5) * 10) / 10);
          max = Math.min(100, Math.ceil((mid + 5) * 10) / 10);
        }
      } else if (dataMin >= 0 && min < 0) {
        min = 0;
      } else {
        min = Math.floor(min * 10) / 10;
        max = Math.ceil(max * 10) / 10;
      }

      return { min, max };
    }

    function getScatterGrid(layout) {
      return {
        left: layout.scatterGridLeft,
        right: layout.scatterGridRight,
        top: layout.scatterGridTop,
        bottom: layout.scatterGridBottom,

      };

      };

      if (options.max != null) axis.max = options.max;
      if (options.minInterval != null) axis.minInterval = options.minInterval;
      return axis;
    }

    function buildScatterXAxis(name, layout, options = {}) {
      const axis = {
        type: 'value',
        name,
        nameLocation: 'middle',
        nameGap: layout.scatterXNameGap,
        axisLabel: {
          color: CHART_AXIS,

        },

      };
      if (options.min != null) axis.min = options.min;
      if (options.max != null) axis.max = options.max;

    function setChartHeight(itemCount) {
      const el = document.getElementById('chart');
      if (itemCount <= 0) {
        el.style.height = isMobile() ? Math.max(window.innerHeight - 260, 320) + 'px' : '';
        return;
      }
      const mobile = isMobile();
      const rowHeight = mobile ? 22 : 36;
      const chrome = mobile ? 48 : 120;
      const minHeight = mobile ? 260 : 520;
      el.style.height = Math.max(minHeight, itemCount * rowHeight + chrome) + 'px';
    }

    function setScatterChartHeight(itemCount) {
      const el = document.getElementById('chart');
      const mobile = isMobile();
      const minHeight = mobile ? 420 : 520;
      const baseCount = 12;
      if (itemCount <= baseCount) {
        el.style.height = mobile ? `${minHeight}px` : '';
        return;
      }
      const extraPerPoint = mobile ? 10 : 12;
      const maxHeight = mobile ? 760 : Math.max(window.innerHeight - 120, 880);
      const height = Math.min(
        minHeight + (itemCount - baseCount) * extraPerPoint,
        maxHeight
      );
      el.style.height = `${Math.max(minHeight, height)}px`;

    function buildBarCategoryYAxis(categories, layout) {
      return {
        type: 'category',
        data: categories,
        axisLabel: {
          color: CHART_TEXT,
          fontSize: layout.axisFontSize,
          interval: 0,
          overflow: 'none'
        },
        axisLine: { lineStyle: { color: CHART_LINE } }
      };
    }

    function parseValue(value, column) {
      if (value == null || value === '') return 0;
      if (typeof value === 'string' && value.includes('%')) {
        return parseFloat(value.replace('%', '')) || 0;
      }
      return Number(value) || 0;
    }

    function getPoisonSkillRate(item) {
      for (const col of POISON_RATE_COLS) {
        if (col in item) return parseValue(item[col], col);
      }
      const use = parseValue(item[WITCH_POISON_USE_COL], WITCH_POISON_USE_COL);
      const wolf = parseValue(item[WITCH_POISON_WOLF_COL], WITCH_POISON_WOLF_COL);
      return use > 0 ? (wolf / use * 100) : 0;
    }

    function getHunterSkillRate(item) {
      if (HUNTER_SKILL_RATE_COL in item) {
        return parseValue(item[HUNTER_SKILL_RATE_COL], HUNTER_SKILL_RATE_COL);
      }
      const use = parseValue(item[HUNTER_SKILL_USE_COL], HUNTER_SKILL_USE_COL);
      const wolf = parseValue(item[HUNTER_SKILL_WOLF_COL], HUNTER_SKILL_WOLF_COL);
      return use > 0 ? (wolf / use * 100) : 0;
    }

    function getPlayerInSeason(season, name) {
      return (seasonStats[season] || []).find(item => item[NAME_KEY] === name);
    }

    function getSeasonAverage(season, column) {
      const data = filterSeasonByMinAppearances(seasonStats[season] || []);
      if (!data.length) return 0;
      const sum = data.reduce((acc, item) => acc + parseValue(item[column], column), 0);
      return sum / data.length;
    }

    function getCompareSeries(seriesKey) {
      return COMPARE_SERIES[seriesKey] || COMPARE_SERIES.jingcheng;
    }

    function getCompareSeasonList(seriesKey) {
      return getCompareSeries(seriesKey).seasons;
    }

    function getCurrentSeriesKey() {
      const el = document.getElementById('seriesSelect');
      return el ? el.value : 'jingcheng';
    }

    function getSeriesKeyForSeason(season) {
      if (COMPARE_SERIES.jingcheng.seasons.includes(season)) return 'jingcheng';
      if (COMPARE_SERIES.yuexiao.seasons.includes(season)) return 'yuexiao';
      return 'jingcheng';
    }

    function getSeriesSeason(seriesKey, preferredSeason) {
      const seasons = getCompareSeasonList(seriesKey);
      if (preferredSeason && seasons.includes(preferredSeason)) return preferredSeason;
      return SERIES_DEFAULT_SEASON[seriesKey] || seasons[seasons.length - 1];
    }

    function refreshSeasonSelectOptions() {
      const seriesKey = getCurrentSeriesKey();
      const seasons = getCompareSeasonList(seriesKey);
      const season = getSeriesSeason(seriesKey, currentSeason);
      const el = document.getElementById('seasonSelect');
      el.innerHTML = seasons.map(s =>
        `<option value="${s}">${s}</option>`
      ).join('');

    function isRadarSeatView() {
      return currentView === 'radar' && radarSubMode === 'seat';
    }

    function getCompareColumns(seriesKey) {
      const seasons = getCompareSeasonList(seriesKey);
      if (!seasons.some(s => seasonStats[s]?.length)) return [];
      const cols = new Set();
      seasons.forEach(season => {
        Object.keys(seasonStats[season][0] || {}).forEach(k => cols.add(k));
      });
      return COMPARE_METRIC_COLUMNS.filter(c => cols.has(c));
    }

    function getComparePlayerNames(seriesKey) {
      const totals = new Map();
      const maxAppear = new Map();
      getCompareSeasonList(seriesKey).forEach(season => {
        (seasonStats[season] || []).forEach(item => {
          const name = item[NAME_KEY];
          const count = parseValue(item['出场次数'], '出场次数');
          totals.set(name, (totals.get(name) || 0) + count);
          maxAppear.set(name, Math.max(maxAppear.get(name) || 0, count));
        });
      });
      return [...totals.entries()]
        .filter(([name]) => maxAppear.get(name) >= CHART_MIN_APPEARANCES)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))
        .map(([name]) => name);
    }

    function formatCompareValue(value, column) {
      if (column.includes('率')) return formatPercent(value);
      if (column === '平均存活天数') return Number(value).toFixed(1);
      return Number.isInteger(value) ? String(value) : Number(value).toFixed(1);
    }

    function hasCompareSeasonPlayer(season, name) {
      return Boolean(getPlayerInSeason(season, name));
    }

    function getCompareSeasonDetail(season, name, column) {
      const player = getPlayerInSeason(season, name);
      const raw = player ? parseValue(player[column], column) : 0;
      const avg = getSeasonAverage(season, column);
      return { raw, avg, display: player ? (player[column] ?? '-') : '-' };
    }

    function renderPersonalCompare(name, metric, seriesKey) {
      const series = getCompareSeries(seriesKey);
      const compareSeasons = getCompareSeasonList(seriesKey);
      const layout = getChartLayout();
      const avgLabel = '赛季平均值';
      setCompareChartHeight();

      const playerData = compareSeasons.map(season => {
        if (!hasCompareSeasonPlayer(season, name)) return null;
        const player = getPlayerInSeason(season, name);
        return parseValue(player[metric], metric);
      });
      const avgData = compareSeasons.map(season => {
        if (!(seasonStats[season] || []).length) return null;
        return getSeasonAverage(season, metric);
      });
      const yAxisFormatter = metric.includes('率') ? (v) => formatPercent(v) : '{value}';
      const yAxisRange = getCompareYAxisRange([...playerData, ...avgData], metric);
      const tooltipFormatter = (params) => {
        const season = params[0]?.axisValue;
        if (!season) return '';
        const d = getCompareSeasonDetail(season, name, metric);
        return params.map(p => {
          const text = p.seriesName === name
            ? `个人：${d.display}`
            : `${avgLabel}：${formatCompareValue(d.avg, metric)}`;
          return `${p.marker}${p.seriesName}<br/>${text}`;
        }).join('<br/><br/>');
      };

      const option = {
        backgroundColor: 'transparent',
        legend: buildChartLegend([name, avgLabel], layout),
        tooltip: {
          trigger: 'axis',
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter: tooltipFormatter
        },
        grid: getCompareChartGrid(layout),
        xAxis: {
          type: 'category',
          data: [...compareSeasons],
          axisLabel: { color: CHART_TEXT, fontSize: layout.axisFontSize },
          axisLine: { lineStyle: { color: CHART_LINE } }
        },
        yAxis: {
          type: 'value',
          min: yAxisRange.min,
          max: yAxisRange.max,
          axisLabel: {
            color: CHART_AXIS,
            fontSize: layout.axisFontSize,
            formatter: yAxisFormatter
          },
          splitLine: { lineStyle: { color: CHART_LINE } }
        },
        series: [
          {
            name,
            type: 'line',
            connectNulls: false,
            data: playerData,
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: { color: COMPARE_PLAYER_COLOR, width: 2 },
            itemStyle: { color: COMPARE_PLAYER_COLOR }
          },
          {
            name: avgLabel,
            type: 'line',
            connectNulls: false,
            data: avgData,
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: { color: COMPARE_AVG_COLOR, width: 2 },
            itemStyle: { color: COMPARE_AVG_COLOR }
          }
        ],
        animationDuration: 600
      };

      chart.setOption(option, true);
      chart.resize();
    }

    function formatPercent(value) {

    function formatValue(value, column) {

      if (SURVIVAL_DAY_COLUMNS.has(column)) {
        return Number(value).toFixed(1);
      }
      return String(value);

    function formatRadarTableAverage(value, column) {

      if (SURVIVAL_DAY_COLUMNS.has(column)) {
        return Number(value).toFixed(1);
      }
      const num = Number(value);

      return Number.isInteger(num) ? String(num) : num.toFixed(1);
    }

    function parseTongbianValue(value, column) {

    function getTongbianEmptyMessage(selectedName) {
      if (!tongbianData.length) {
        return '本赛季暂无同边数据（需至少两名出场次数>=9 的玩家才会生成配对统计）。';
      }
      if (selectedName) {
        return `玩家「${selectedName}」暂无同边配对记录。`;
      }
      return '暂无同边数据。';
    }

      const notice = document.getElementById('tongbianEmptyNotice');
      if (!showNotice) {
        notice.style.display = 'none';
        notice.textContent = '';
        return;
      }
      notice.textContent = getTongbianEmptyMessage(selectedName);
      notice.style.display = 'block';

    function parseTongbianSessions(text) {
      if (text == null || !String(text).trim()) return [];
      return String(text).split(',').map(part => part.trim()).filter(Boolean).map(entry => {
        const match = entry.match(/^(\d+)（([\s\S]+)）$/);
        if (!match) {
          return { rawDate: '', detail: '', full: entry };
        }
        return {
          rawDate: match[1],
          detail: match[2],
          full: entry,
        };
      });
    }

    const TONGBIAN_CIVILIAN_IDENTITIES = new Set(['平民', '好人混']);
    const TONGBIAN_WOLF_MIX_IDENTITIES = new Set(['狼人混']);
    const TONGBIAN_WOLF_IDENTITIES = new Set([
      '假面', '典狱长', '捣蛋鬼', '梦魇', '狼', '狼术师', '狼王', '狼美人', '石像鬼', '诡术师', '黑狼王',
    ]);

    function campFromIdentity(identity) {
      const id = String(identity ?? '').trim();
      if (!id) return '神职';
      if (TONGBIAN_CIVILIAN_IDENTITIES.has(id)) return '平民';
      if (TONGBIAN_WOLF_MIX_IDENTITIES.has(id)) return '狼人混';
      if (
        TONGBIAN_WOLF_IDENTITIES.has(id)
        || id.includes('盗宝')
        || id.includes('机械')
        || id.includes('傀儡')
      ) {
        return '狼人';
      }
      return '神职';
    }

    function isWolfCamp(camp) {
      return camp === '狼人' || camp === '狼人混';
    }

    function parseTongbianSessionDetail(detail) {
      const players = [];
      let winSide = '';
      String(detail).split('、').map(part => part.trim()).filter(Boolean).forEach(part => {
        const match = part.match(/^(.+)：(.+)$/);
        if (!match) return;
        const key = match[1].trim();
        const value = match[2].trim();
        if (key === '胜利方') {
          winSide = value;
        } else {
          players.push({ name: key, identity: value });
        }
      });
      return { players, winSide };
    }

    function isTongbianSessionSameSideWin(session) {
      if (!session?.detail) return false;
      const { players, winSide } = parseTongbianSessionDetail(session.detail);
      if (players.length < 2 || !winSide) return false;

      const camps = players.map(player => campFromIdentity(player.identity));
      const bothWolf = camps.every(camp => isWolfCamp(camp));
      const bothGood = camps.every(camp => !isWolfCamp(camp));
      if (!bothWolf && !bothGood) return false;

      if (winSide === '狼') return bothWolf;
      if (winSide === '好人') return bothGood;
      return false;
    }

    function formatTongbianSessionDateHtml(rawDate) {
      const dateStr = String(rawDate ?? '').trim();
      if (!dateStr) return '';
      const { day, roundLabel } = parseGameDateDisplay(dateStr);
      if (!day && !roundLabel) {
        return `<span class="tongbian-session-date-day">${escapeHtml(dateStr)}</span>`;
      }
      return `<span class="tongbian-session-date-day">${escapeHtml(day || dateStr)}</span>` +
        (roundLabel ? `<span class="tongbian-session-date-round">${escapeHtml(roundLabel)}</span>` : '');
    }

    function formatTongbianSessionPlayersHtml(players) {
      if (!players.length) return '';
      return players.map((player, index) => {
        const sep = index > 0
          ? '<span class="tongbian-session-player-sep" aria-hidden="true">·</span>'
          : '';
        return sep +
          `<span class="tongbian-session-player">` +
          `<span class="tongbian-session-player-name">${escapeHtml(player.name)}</span>` +
          `<span class="tongbian-session-player-id">${escapeHtml(player.identity)}</span>` +
          `</span>`;
      }).join('');
    }

    function formatTongbianSessionWinLabel(winSide) {
      if (winSide === '狼') return '狼胜利';
      if (winSide === '好人') return '好人胜利';
      return winSide ? `${winSide}胜利` : '未知胜负';
    }

    function formatTongbianSessionPlayersText(players) {
      if (!players.length) return '';
      return `（${players.map(player => `${player.name} - ${player.identity}`).join('、')}）`;
    }

    function formatTongbianSessionHtml(session) {
      const rawDate = String(session.rawDate ?? '').trim();
      const { players, winSide } = parseTongbianSessionDetail(session.detail || '');
      if (!rawDate && !session.detail) {
        return escapeHtml(session.full);
      }

      const hasVideo = rawDate && findVideoLink(rawDate);
      const isSameSideWin = isTongbianSessionSameSideWin(session);
      const winLabel = formatTongbianSessionWinLabel(winSide);

      return `<span class="tongbian-session-line">` +
        `<span class="tongbian-session-meta">` +
        formatTongbianSessionDateHtml(rawDate) +
        (hasVideo
          ? `<span class="tongbian-session-video has-link${isSameSideWin ? ' is-win' : ''}">${GAME_SESSION_VIDEO_ICON}</span>`
          : '') +
        `</span>` +
        `<span class="tongbian-session-main">` +
        (players.length
          ? `<span class="tongbian-session-players">${formatTongbianSessionPlayersHtml(players)}</span>`
          : '') +
        `</span>` +
        `<span class="tongbian-session-win-tag${getTongbianSessionWinTagClass(winSide)}">${escapeHtml(winLabel)}</span>` +
        `</span>`;
    }

    function getTongbianSessionWinTagClass(winSide) {
      if (winSide === '狼') return ' is-wolf';
      if (winSide === '好人') return ' is-good';
      return '';
    }

    function getTongbianSessionTitle(session) {
      const rawDate = String(session.rawDate ?? '').trim();
      const { players, winSide } = parseTongbianSessionDetail(session.detail || '');
      if (!rawDate && session.full) return session.full;
      const winLabel = formatTongbianSessionWinLabel(winSide);
      const playersText = formatTongbianSessionPlayersText(players);
      return `${rawDate}${winLabel}${playersText}`;
    }

    function sortTongbianSessions(sessions) {
      return sessions.slice().sort((a, b) => {
        const da = Number(a.rawDate) || 0;
        const db = Number(b.rawDate) || 0;
        return db - da;
      });
    }

    function setTongbianSessionsModalOpen(open) {
      const modal = document.getElementById('tongbianSessionsModal');
      if (!modal) return;
      modal.classList.toggle('is-open', open);
      modal.setAttribute('aria-hidden', open ? 'false' : 'true');
      document.body.classList.toggle('tongbian-sessions-modal-open', open);
      if (!open) currentTongbianModalRow = null;
    }

    function renderTongbianSessionsModalContent(row) {
      if (!row) return;
      currentTongbianModalRow = row;
      const titleEl = document.getElementById('tongbianSessionsModalTitle');
      const names = `${row[NAME_A_KEY]} · ${row[NAME_B_KEY]}`;

      const sessions = sortTongbianSessions(parseTongbianSessions(row[TONGBIAN_SESSIONS_COL]));
      const winCount = sessions.filter(session => isTongbianSessionSameSideWin(session)).length;
      if (sessions.length) {
        titleEl.innerHTML =
          `${escapeHtml(names)}<span class="tongbian-sessions-meta"> 共 ${sessions.length} 场 · 同边胜 ${winCount} 场</span>`;
      } else {
        titleEl.textContent = names;
      }

      const content = document.getElementById('tongbianSessionsContent');
      if (!sessions.length) {
        content.innerHTML = '<p class="tongbian-sessions-empty">暂无同边场次记录</p>';
        return;
      }

      const itemsHtml = sessions.map(session => {
        const rawDate = String(session.rawDate ?? '').trim();
        const winClass = isTongbianSessionSameSideWin(session) ? ' is-same-side-win' : '';
        const videoClass = rawDate && findVideoLink(rawDate) ? ' has-video' : '';
        return `<button type="button" class="tongbian-session-item${winClass}${videoClass}"${rawDate ? ` data-raw-date="${escapeHtml(rawDate)}"` : ''} title="${escapeHtml(getTongbianSessionTitle(session))}">` +
          formatTongbianSessionHtml(session) +
          '</button>';
      }).join('');

      content.innerHTML = itemsHtml;
    }

    function openTongbianSessionsModal(row) {
      renderTongbianSessionsModalContent(row);
      setTongbianSessionsModalOpen(true);
    }

    function bindTongbianSessionsModal() {
      document.querySelectorAll('[data-tongbian-sessions-close]').forEach(el => {
        el.addEventListener('click', () => setTongbianSessionsModalOpen(false));
      });
      document.getElementById('tongbianSessionsContent').addEventListener('click', (e) => {
        const item = e.target.closest('.tongbian-session-item[data-raw-date]');
        if (!item) return;
        openVideoLinkForSession(item.dataset.rawDate);
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('tongbianSessionsModal').classList.contains('is-open')) {
          setTongbianSessionsModalOpen(false);
        }
      });
    }

    function renderTongbianTable(selectedName) {
      const columns = getTongbianTableColumns();
      const { column, direction } = tongbianSort;
      const sorted = [...getTongbianFilteredRows(selectedName)].sort((a, b) => {
        const av = parseTongbianValue(a[column], column);
        const bv = parseTongbianValue(b[column], column);
        return direction === 'asc' ? av - bv : bv - av;
      });
      const thead = document.getElementById('tongbianHead');
      const tbody = document.getElementById('tongbianBody');
      const isEmpty = sorted.length === 0;
      const seasonEmpty = !tongbianData.length;

      thead.innerHTML = `<tr>${columns.map(col => renderTongbianHeaderCell(col)).join('')}</tr>`;
      if (isEmpty && !seasonEmpty) {
        tongbianRenderedRows = [];
        tbody.innerHTML = `<tr><td colspan="${columns.length}" class="table-empty-cell">${getTongbianEmptyMessage(selectedName)}</td></tr>`;
      } else if (!isEmpty) {
        tongbianRenderedRows = sorted;
        tbody.innerHTML = sorted.map((row, index) =>
          `<tr class="tongbian-row-clickable" data-tongbian-row="${index}">${columns.map(col =>
            `<td class="${getTongbianCellClass(col)}">${escapeHtml(String(row[col] ?? ''))}</td>`
          ).join('')}</tr>`
        ).join('');
      } else {
        tongbianRenderedRows = [];
        tbody.innerHTML = '';
      }
      updateTongbianEmptyNotice(selectedName, seasonEmpty);
      applyTongbianStickyOffsets();
      document.getElementById('tongbianTable').classList.toggle('tongbian-player-filtered', !!selectedName);
    }

    function getBarColor(value, average, belowAvgGreen) {
      if (belowAvgGreen && value < average) {
        return BAR_COLOR_BELOW_AVG;
      }
      return BAR_COLOR;
    }

    function hasBlindPoisonedComboData() {
      const row = rawData[0] || {};
      return BLIND_POISON_COL in row && NON_WOLF_BLIND_POISON_COL in row;
    }

    function getBlindPoisonedComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const blind = parseValue(item[BLIND_POISON_COL], BLIND_POISON_COL);
          const nonWolf = parseValue(item[NON_WOLF_BLIND_POISON_COL], NON_WOLF_BLIND_POISON_COL);
          return {
            name: item[NAME_KEY],
            blind,
            nonWolf,
            other: Math.max(0, blind - nonWolf)
          };
        })
        .filter(item => item.blind > 0)
        .sort((a, b) => a.blind - b.blind);
    }

    function parseSeatNumberCounts(text) {
      if (text == null || !String(text).trim()) return new Map();
      const counts = new Map();
      String(text).split('、').forEach((part) => {
        const trimmed = part.trim();
        if (!trimmed) return;
        const match = trimmed.match(/^(\d+)号（(\d+)）$/);
        if (!match) return;
        counts.set(Number(match[1]), Number(match[2]));
      });
      return counts;
    }

    function getSeatCountForPlayer(player, seatNumber) {
      return parseSeatNumberCounts(player[SEAT_NUMBER_COUNTS_COL]).get(seatNumber) || 0;
    }

    function formatSeatNumberDetailText(text) {
      const counts = parseSeatNumberCounts(text);
      if (!counts.size) return '';
      return [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .map(([seat, cnt]) => `${seat}号位（${cnt}）`)
        .join('、');
    }

    function getSeatNumberChartItems(seatNumber) {
      const items = getMinAppearanceRows()
        .map(item => ({
          name: item[NAME_KEY],
          value: getSeatCountForPlayer(item, seatNumber),
        }))
        .filter(item => item.value > 0)
        .sort((a, b) => b.value - a.value || a.name.localeCompare(b.name, 'zh-CN'));

      if (items.length <= OTHER_SEAT_CHART_TOP) {
        return items.slice().reverse();
      }

      const cutoffValue = items[OTHER_SEAT_CHART_TOP - 1].value;
      return items
        .filter(item => item.value >= cutoffValue)
        .reverse();
    }

    function getChartData(column, options = {}) {
      const { excludeZero = false, requirePositiveCol = null } = options;
      return getMinAppearanceRows()
        .filter(item => (
          !requirePositiveCol
          || parseValue(item[requirePositiveCol], requirePositiveCol) > 0
        ))
        .map(item => ({
          name: item[NAME_KEY],
          value: parseValue(item[column], column),
          appearances: parseValue(item['出场次数'], '出场次数'),
          nonFirstAppearances: NON_FIRST_APPEARANCE_COL in item
            ? parseValue(item[NON_FIRST_APPEARANCE_COL], NON_FIRST_APPEARANCE_COL)
            : null,
          wolfCount: column === NON_FIRST_WOLF_RATE_COL && NON_FIRST_WOLF_COUNT_COL in item
            ? parseValue(item[NON_FIRST_WOLF_COUNT_COL], NON_FIRST_WOLF_COUNT_COL)
            : '狼次数' in item
              ? parseValue(item['狼次数'], '狼次数')
              : null,
          goodCount: column === GOOD_SHERIFF_BELOW_RATE_COL && GOOD_COUNT_COL in item
            ? parseValue(item[GOOD_COUNT_COL], GOOD_COUNT_COL)
            : null,
        }))
        .filter(d => !excludeZero || d.value !== 0)
        .sort((a, b) => a.value - b.value);
    }

    function hasWitchPoisonComboData() {
      const row = rawData[0] || {};
      return '出场次数' in row
        && WITCH_POISON_WITCH_COL in row
        && WITCH_POISON_USE_COL in row
        && WITCH_POISON_WOLF_COL in row;
    }

    function hasDreamFirstComboData() {
      const row = rawData[0] || {};
      return DREAM_WALKER_COL in row
        && DREAM_FIRST_WOLF_COL in row
        && DREAM_FIRST_SPECIAL_COL in row;
    }

    function hasBlindPoisonWolfRateData() {
      const row = rawData[0] || {};
      return BLIND_POISON_WOLF_RATE_COL in row
        && BLIND_POISON_USE_COL in row
        && BLIND_POISON_WOLF_COUNT_COL in row;
    }

    function hasHunterSkillComboData() {
      const row = rawData[0] || {};
      return HUNTER_COUNT_COL in row
        && HUNTER_SKILL_USE_COL in row
        && HUNTER_SKILL_WOLF_COL in row;
    }

    function hasSkillData() {
      return hasWitchPoisonComboData()
        || hasHunterSkillComboData()
        || hasDreamFirstComboData()
        || hasBlindPoisonWolfRateData();
    }

    function getBlindPoisonWolfRateItems() {
      return getMinAppearanceRows()
        .map(item => {
          const blindUse = parseValue(item[BLIND_POISON_USE_COL], BLIND_POISON_USE_COL);
          const blindWolf = parseValue(item[BLIND_POISON_WOLF_COUNT_COL], BLIND_POISON_WOLF_COUNT_COL);
          return {
            name: item[NAME_KEY],
            rate: parseValue(item[BLIND_POISON_WOLF_RATE_COL], BLIND_POISON_WOLF_RATE_COL),
            blindUse,
            blindWolf,
            blindOther: Math.max(0, blindUse - blindWolf),
          };
        })
        .filter(d => d.blindUse > 0)
        .sort((a, b) => {
          if (a.rate !== b.rate) return a.rate - b.rate;
          return a.blindUse - b.blindUse;
        });
    }

    function hasMinAppearances(item) {
      return parseValue(item['出场次数'], '出场次数') >= CHART_MIN_APPEARANCES;
    }

    function filterSeasonByMinAppearances(data) {
      if (!data.length) return [];
      return data.filter(item => hasMinAppearances(item));
    }

    function getMinAppearanceRows() {
      return filterSeasonByMinAppearances(rawData);
    }

    function getMetricRankEligibleRows() {
      return getMinAppearanceRows();
    }

    function getWitchPoisonComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const witch = parseValue(item[WITCH_POISON_WITCH_COL], WITCH_POISON_WITCH_COL);
          const use = parseValue(item[WITCH_POISON_USE_COL], WITCH_POISON_USE_COL);
          const wolf = parseValue(item[WITCH_POISON_WOLF_COL], WITCH_POISON_WOLF_COL);
          const rate = getPoisonSkillRate(item);
          return {
            name: item[NAME_KEY],
            witch,
            use,
            wolf,
            rate,
            useOther: Math.max(0, use - wolf),
            other: Math.max(0, witch - use)
          };
        })
        .filter(item => item.witch > 0)
        .sort((a, b) => {
          if (a.rate !== b.rate) return a.rate - b.rate;
          return a.witch - b.witch;
        });
    }

    function getHunterSkillComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const hunter = parseValue(item[HUNTER_COUNT_COL], HUNTER_COUNT_COL);
          const use = parseValue(item[HUNTER_SKILL_USE_COL], HUNTER_SKILL_USE_COL);
          const wolf = parseValue(item[HUNTER_SKILL_WOLF_COL], HUNTER_SKILL_WOLF_COL);
          const rate = getHunterSkillRate(item);
          return {
            name: item[NAME_KEY],
            hunter,
            use,
            wolf,
            rate,
            useOther: Math.max(0, use - wolf),
            other: Math.max(0, hunter - use),
          };
        })
        .filter(item => item.hunter > 0)
        .sort((a, b) => {
          if (a.rate !== b.rate) return a.rate - b.rate;
          return a.hunter - b.hunter;
        });
    }

    function getDreamFirstComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const dreamer = parseValue(item[DREAM_WALKER_COL], DREAM_WALKER_COL);
          const wolf = parseValue(item[DREAM_FIRST_WOLF_COL], DREAM_FIRST_WOLF_COL);
          const special = parseValue(item[DREAM_FIRST_SPECIAL_COL], DREAM_FIRST_SPECIAL_COL);
          return {
            name: item[NAME_KEY],
            dreamer,
            wolf,
            special,
            wolfOther: Math.max(0, wolf - special),
            other: Math.max(0, dreamer - wolf)
          };
        })
        .filter(item => item.dreamer > 0)
        .sort((a, b) => a.dreamer - b.dreamer);
    }

    function getAppearanceComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const total = parseValue(item[APPEARANCE_COMBO_TOTAL], APPEARANCE_COMBO_TOTAL);
          const wolf = parseValue(item[APPEARANCE_COMBO_WOLF], APPEARANCE_COMBO_WOLF);
          const skillWolf = APPEARANCE_COMBO_SKILL_WOLF in item
            ? parseValue(item[APPEARANCE_COMBO_SKILL_WOLF], APPEARANCE_COMBO_SKILL_WOLF)
            : 0;
          const skillWolfSeg = Math.min(skillWolf, wolf);
          const wolfOther = Math.max(0, wolf - skillWolfSeg);
          const identity = parseValue(item[APPEARANCE_COMBO_IDENTITY], APPEARANCE_COMBO_IDENTITY);
          const yutong = APPEARANCE_COMBO_YUTONG in item
            ? parseValue(item[APPEARANCE_COMBO_YUTONG], APPEARANCE_COMBO_YUTONG)
            : 0;
          const identitySeg = Math.max(0, identity - wolf);
          const yutongSeg = Math.min(yutong, identitySeg);
          const identityGreen = Math.max(0, identitySeg - yutongSeg);
          const other = Math.max(0, total - identity);
          return {
            name: item[NAME_KEY],
            total,
            wolf,
            skillWolf: skillWolfSeg,
            wolfOther,
            identity,
            yutong: yutongSeg,
            identitySeg,
            identityGreen,
            other
          };
        })
        .sort((a, b) => a.total - b.total);
    }

    function hasAppearanceComboData() {
      const row = rawData[0] || {};
      return APPEARANCE_COMBO_TOTAL in row
        && APPEARANCE_COMBO_WOLF in row
        && APPEARANCE_COMBO_IDENTITY in row;
    }

    function isAppearanceComboColumn(column) {
      return column === APPEARANCE_DATA_KEY;
    }

    function getWolfEligibleRows() {
      return getMinAppearanceRows();
    }

    function getWolfComboItems(mode) {
      const items = getWolfEligibleRows().map(item => {
        const total = parseValue(item[WOLF_COMBO_TOTAL], WOLF_COMBO_TOTAL);
        const hjt = parseValue(item[WOLF_COMBO_HJT], WOLF_COMBO_HJT);
        const self = parseValue(item[WOLF_COMBO_SELF], WOLF_COMBO_SELF);
        const selfRate = total > 0 ? (self / total) * 100 : 0;
        return {
          name: item[NAME_KEY],
          total,
          hjt,
          self,
          selfRate,
          hjtOther: Math.max(0, total - hjt),
          selfOther: Math.max(0, total - self)
        };
      });
      const sortDesc = (primaryA, primaryB, totalA, totalB) => {
        if (primaryA !== primaryB) return primaryA - primaryB;
        return totalA - totalB;
      };
      if (mode === 'self') {
        return items.sort((a, b) => sortDesc(a.selfRate, b.selfRate, a.total, b.total));
      }
      return items.sort((a, b) => sortDesc(a.hjt, b.hjt, a.total, b.total));
    }

    function hasWolfRateData() {
      return rawData.length > 0 && WOLF_RATE_COL in rawData[0];
    }

    function hasWolfRateBanxingData() {
      return rawData.length > 0 && BANXING_WOLF_RATE_COL in rawData[0];
    }

    function hasSelfKnifeComboData() {
      const row = rawData[0] || {};
      return RED_WOLF_COL in row
        && SELF_KNIFE_COL in row
        && TEAMMATE_SELF_KNIFE_COL in row;
    }

    function hasFirstKnifeWitchComboData() {
      const row = rawData[0] || {};
      return RED_WOLF_COL in row && FIRST_KNIFE_WITCH_COL in row;
    }

    function getFirstKnifeWitchComboItems() {
      return getWolfEligibleRows()
        .map(item => {
          const redWolf = parseValue(item[RED_WOLF_COL], RED_WOLF_COL);
          const firstKnifeWitch = parseValue(item[FIRST_KNIFE_WITCH_COL], FIRST_KNIFE_WITCH_COL);
          return {
            name: item[NAME_KEY],
            redWolf,
            firstKnifeWitch,
            other: Math.max(0, redWolf - firstKnifeWitch)
          };
        })
        .filter(item => item.redWolf > 0)
        .sort((a, b) => {
          if (a.firstKnifeWitch !== b.firstKnifeWitch) return a.firstKnifeWitch - b.firstKnifeWitch;
          return a.redWolf - b.redWolf;
        });
    }

    function getSelfKnifeComboItems() {
      return getWolfEligibleRows()
        .map(item => {
          const redWolf = parseValue(item[RED_WOLF_COL], RED_WOLF_COL);
          const selfKnife = parseValue(item[SELF_KNIFE_COL], SELF_KNIFE_COL);
          const teammateKnife = parseValue(item[TEAMMATE_SELF_KNIFE_COL], TEAMMATE_SELF_KNIFE_COL);
          return {
            name: item[NAME_KEY],
            redWolf,
            selfKnife,
            teammateKnife,
            other: Math.max(0, redWolf - selfKnife - teammateKnife)
          };
        })
        .filter(item => item.redWolf > 0)
        .sort((a, b) => {
          const knifeA = a.selfKnife + a.teammateKnife;
          const knifeB = b.selfKnife + b.teammateKnife;
          if (knifeA !== knifeB) return knifeA - knifeB;
          return a.redWolf - b.redWolf;
        });
    }

    function hasJixieWolfComboData() {
      const row = rawData[0] || {};
      return JIXIE_WOLF_TOTAL_COL in row
        && JIXIE_CIVILIAN_COL in row
        && JIXIE_DUAL_COL in row
        && JIXIE_WITCH_COL in row
        && JIXIE_GUARD_COL in row
        && JIXIE_HUNTER_COL in row
        && JIXIE_MEDIUM_COL in row;
    }

    function hasWolfComboData() {
      const row = rawData[0] || {};
      const hasHjtSelf = '出场次数' in row
        && WOLF_COMBO_TOTAL in row
        && WOLF_COMBO_HJT in row
        && WOLF_COMBO_SELF in row;
      return hasWolfRateData() || hasHjtSelf || hasJixieWolfComboData() || hasSelfKnifeComboData() || hasFirstKnifeWitchComboData() || hasLaganData();
    }

    function hasLaganData() {
      const row = rawData[0] || {};
      return LAGAN_RECORD_COL in row;
    }

    function parseLaganRecordEntry(entry) {
      const text = String(entry ?? '').trim();
      if (!text) return null;
      const parts = text.split('-');
      if (parts.length < 4) return null;
      return {
        '日期场次': parts[0],
        '姓名': parts[1],
        '被拉杆玩家': parts[2],
        '被拉杆身份': parts.slice(3).join('-'),
      };
    }

    function buildSessionWinLookup() {
      const lookup = new Map();
      rawTableData.forEach(row => {
        const date = String(row['日期'] ?? '').trim();
        if (!date || lookup.has(date)) return;
        const win = row[WIN_KEY];
        if (win != null && String(win).trim() !== '') {
          lookup.set(date, String(win).trim());
        }
      });
      return lookup;
    }

    function getLaganTableRows() {
      const winLookup = buildSessionWinLookup();
      const rows = [];
      rawData.forEach(item => {
        const raw = item[LAGAN_RECORD_COL];
        if (raw == null || String(raw).trim() === '') return;
        String(raw).split(',').forEach(entry => {
          const parsed = parseLaganRecordEntry(entry);
          if (parsed) {
            const sessionDate = String(parsed['日期场次']).trim();
            parsed['胜利'] = winLookup.get(sessionDate) || '—';
            rows.push(parsed);
          }
        });
      });
      return rows.sort((a, b) => String(b['日期场次']).localeCompare(String(a['日期场次']), 'zh-CN'));
    }

    function renderLaganTableCell(col, row) {
      if (col === '日期场次') {
        return formatDateWithVideoIcon(row[col]);
      }
      if (col === '胜利') {
        const win = String(row[col] ?? '—');
        const winClass = getRawTableWinClass(win);
        return `<span class="raw-game-info-win${winClass ? ` ${winClass}` : ''}">${escapeHtml(win)}</span>`;
      }
      return escapeHtml(String(row[col] ?? ''));
    }

    function renderLaganTable() {
      setChartHeight(0);
      const rows = getLaganTableRows();
      const emptyNotice = document.getElementById('laganEmptyNotice');
      const thead = document.getElementById('laganHead');
      const tbody = document.getElementById('laganBody');

      thead.innerHTML = `<tr>${LAGAN_TABLE_COLUMNS.map(col =>
        `<th>${escapeHtml(col)}</th>`
      ).join('')}</tr>`;

      if (!rows.length) {
        tbody.innerHTML = '';
        emptyNotice.textContent = hasLaganData()
          ? '暂无拉杆记录'
          : '当前赛季数据暂无拉杆记录字段';
        emptyNotice.style.display = '';
        return;
      }

      emptyNotice.style.display = 'none';
      tbody.innerHTML = rows.map(row => {
        const rawDate = String(row['日期场次'] ?? '').trim();
        return `<tr data-raw-date="${escapeHtml(rawDate)}">${LAGAN_TABLE_COLUMNS.map(col =>
          `<td>${renderLaganTableCell(col, row)}</td>`
        ).join('')}</tr>`;
      }).join('');
    }

    function getJixieWolfComboItems() {
      return getMinAppearanceRows()
        .map(item => {
          const total = parseValue(item[JIXIE_WOLF_TOTAL_COL], JIXIE_WOLF_TOTAL_COL);
          const civilian = parseValue(item[JIXIE_CIVILIAN_COL], JIXIE_CIVILIAN_COL);
          const dual = parseValue(item[JIXIE_DUAL_COL], JIXIE_DUAL_COL);
          const witch = parseValue(item[JIXIE_WITCH_COL], JIXIE_WITCH_COL);
          const guard = parseValue(item[JIXIE_GUARD_COL], JIXIE_GUARD_COL);
          const hunter = parseValue(item[JIXIE_HUNTER_COL], JIXIE_HUNTER_COL);
          const medium = parseValue(item[JIXIE_MEDIUM_COL], JIXIE_MEDIUM_COL);
          const subSum = civilian + dual + witch + guard + hunter + medium;
          return {
            name: item[NAME_KEY],
            total,
            base: Math.max(0, total - subSum),
            civilian,
            dual,
            witch,
            guard,
            hunter,
            medium
          };
        })
        .filter(item => item.total > 0)
        .sort((a, b) => a.total - b.total);
    }

    function isWolfComboColumn(column) {
      return column === WOLF_DATA_KEY;
    }

    function isVoteDataColumn(column) {
      return column === VOTE_DATA_KEY;
    }

    function hasNoProphetExileVoteData() {
      const row = rawData[0] || {};
      return rawData.length > 0
        && VOTE_NO_PROPHET_EXILE_COUNT in row
        && (VOTE_NO_PROPHET_EXILE_RATE in row || VOTE_NO_PROPHET_EXILE_CORRECT_COUNT in row);
    }

    function hasCivilianVoteData() {
      const row = rawData[0] || {};
      return rawData.length > 0
        && VOTE_CIVILIAN_BADGE_COUNT in row
        && VOTE_CIVILIAN_BADGE_RATE in row
        && VOTE_CIVILIAN_EXILE_COUNT in row
        && VOTE_CIVILIAN_EXILE_RATE in row;
    }

    function hasVoteData() {
      return rawData.length > 0 && (
        (VOTE_BADGE_COUNT in rawData[0] && VOTE_EXILE_COUNT in rawData[0])
        || hasNoProphetExileVoteData()
        || hasCivilianVoteData()
      );
    }

    function hasWinRateCampData() {
      return rawData.length > 0
        && WOLF_WIN_RATE_COL in rawData[0]
        && GOOD_WIN_RATE_COL in rawData[0];
    }

    function hasWinRateIdentityData() {
      return rawData.length > 0 && IDENTITY_WIN_RATE_COL in rawData[0];
    }

    function hasWinRateBanxingData() {
      return rawData.length > 0 && BANXING_WIN_RATE_COL in rawData[0];
    }

    function hasWinRateData() {
      return hasWinRateCampData() || hasWinRateIdentityData() || hasWinRateBanxingData();
    }

    function hasSurvivalData() {
      return rawData.length > 0 && AVG_SURVIVAL_COL in rawData[0];
    }

    function hasOtherData() {
      if (!rawData.length) return false;
      if (hasSurvivalData()) return true;
      const row = rawData[0];
      return BLIND_POISON_COL in row
        || FIRST_CHECK_COL in row
        || MIXED_BLOOD_MODEL_COL in row
        || FAKE_GOLD_COL in row
        || GOOD_SHERIFF_BELOW_RATE_COL in row
        || SEAT_NUMBER_COUNTS_COL in row;
    }

    function hasSeatNumberData() {
      return rawData.length > 0 && SEAT_NUMBER_COUNTS_COL in rawData[0];
    }

    function getOtherDataColumn() {
      if (otherSubMode === 'rate') return GOOD_SHERIFF_BELOW_RATE_COL;
      if (otherSubMode === 'first') return FIRST_CHECK_COL;
      if (otherSubMode === 'model') return MIXED_BLOOD_MODEL_COL;
      if (otherSubMode === 'fake') return FAKE_GOLD_COL;
      return BLIND_POISON_COL;
    }

    function getVoteScatterConfig(mode) {
      if (mode === 'badge') {
        return { countCol: VOTE_BADGE_COUNT, rateCol: VOTE_BADGE_RATE, label: '警徽票' };
      }

        return {
          countCol: VOTE_CIVILIAN_BADGE_COUNT,
          rateCol: VOTE_CIVILIAN_BADGE_RATE,

        return {
          countCol: VOTE_CIVILIAN_EXILE_COUNT,
          rateCol: VOTE_CIVILIAN_EXILE_RATE,
          label: '平民放逐票'
        };
      }
      return { countCol: VOTE_EXILE_COUNT, rateCol: VOTE_EXILE_RATE, label: '放逐票' };
    }

      const col = $('columnSelect').value;

    function buildVoteLabelLayout(items) {
      const groups = new Map();
      items.forEach((item, index) => {
        const key = `${item.value[0]},${item.value[1]}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(index);
      });
      const offsets = new Array(items.length).fill(0);
      groups.forEach((indices) => {
        if (indices.length <= 1) return;
        indices.forEach((index, order) => {
          offsets[index] = (order - (indices.length - 1) / 2) * 12;
        });
      });
      return (params) => {
        const offset = offsets[params.dataIndex];
        return offset ? { dy: offset } : {};
      };
    }

    function formatScatterMarkValue(value, column) {
      if (PERCENT_COLUMNS.has(column) || column.includes('率')) {
        return formatPercent(value);
      }
      if (SURVIVAL_DAY_COLUMNS.has(column)) {
        return Number(value).toFixed(1);
      }
      const num = Number(value);
      return Number.isInteger(num) ? String(num) : num.toFixed(1);
    }

    function buildScatterAverageOrigin(xCol, yCol, options = {}) {
      const { showXMean = true, showYMean = true } = options;
      const avgX = getColumnAverage(xCol);
      const avgY = getColumnAverage(yCol);
      const markLineData = [];
      if (showXMean) {
        markLineData.push({
          xAxis: avgX,
          label: { formatter: () => formatScatterMarkValue(avgX, xCol) }
        });
      }
      if (showYMean) {
        markLineData.push({
          yAxis: avgY,
          label: { formatter: () => formatScatterMarkValue(avgY, yCol) }
        });
      }
      const result = {};
      if (markLineData.length) {
        result.markLine = {
          silent: true,
          symbol: 'none',
          lineStyle: { color: CHART_AXIS, type: 'dashed', width: 1.5 },
          label: {
            show: true,
            color: CHART_AXIS,
            fontSize: 11
          },
          data: markLineData
        };
      }
      if (showXMean && showYMean) {
        result.markPoint = {
          silent: true,
          symbol: 'circle',
          symbolSize: 8,
          itemStyle: { color: CHART_AXIS, borderColor: CHART_SURFACE, borderWidth: 1 },
          label: {
            show: true,
            formatter: '均值',
            position: 'right',
            color: CHART_AXIS,
            fontSize: 10,
            distance: 4
          },
          data: [{ coord: [avgX, avgY], name: '平均值' }]
        };
      }
      return result;
    }

    function renderVoteScatterChart() {
      const { countCol, rateCol, countLabel, rateLabel } = getVoteScatterConfig(voteSubMode);
      const xName = countLabel || countCol;
      const yName = rateLabel || rateCol;
      const layout = getChartLayout();

      if (voteSubMode === 'noprophet' && !hasNoProphetExileVoteData()) {
        setScatterChartHeight(1);
        chart.setOption({
          backgroundColor: 'transparent',
          title: {
            subtext: '当前赛季数据暂无生推放逐票统计字段',
            left: 'center',
            top: 'center',
            subtextStyle: { color: CHART_AXIS, fontSize: 12 }
          },
          series: []
        }, true);
        chart.resize();
        return;
      }

      if ((voteSubMode === 'civilian-badge' || voteSubMode === 'civilian-exile') && !hasCivilianVoteData()) {
        setScatterChartHeight(1);
        chart.setOption({
          backgroundColor: 'transparent',
          title: {
            subtext: '当前赛季数据暂无平民警徽票/平民放逐票统计字段',
            left: 'center',
            top: 'center',
            subtextStyle: { color: CHART_AXIS, fontSize: 12 }
          },
          series: []
        }, true);
        chart.resize();
        return;
      }

      const rawItems = getMinAppearanceRows().map(item => ({
        name: item[NAME_KEY],
        value: [
          parseValue(item[countCol], countCol),
          parseValue(item[rateCol], rateCol)
        ]
      }));
      const items = rawItems;

      setScatterChartHeight(items.length);
      const averageOrigin = buildScatterAverageOrigin(countCol, rateCol, { showXMean: false });

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'item',
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {
            return [
              params.data.name,
              `${xName}：${params.value[0]}`,
              `${yName}：${formatPercent(params.value[1])}`
            ].join('<br/>');
          }
        },
        grid: getScatterGrid(layout),
        xAxis: buildScatterXAxis(xName, layout, { minInterval: 1 }),
        yAxis: buildScatterYAxis(yName, layout, {
          max: 100,
          axisLabelFormatter: (v) => formatPercent(v)
        }),
        series: [{
          type: 'scatter',
          data: items,
          symbolSize: 10,
          itemStyle: { color: COMPARE_PLAYER_COLOR },
          label: {
            show: true,
            formatter: ({ data }) => data.name,
            position: 'top',
            distance: 4,
            color: CHART_TEXT,
            fontSize: isMobile() ? 10 : 11,
            hideOverlap: true
          },
          labelLayout: buildVoteLabelLayout(items),
          emphasis: {
            scale: 1.4,
            itemStyle: { color: CHART_BLUE },
            label: { show: true }
          },
          ...(averageOrigin.markLine ? { markLine: averageOrigin.markLine } : {}),
          ...(averageOrigin.markPoint ? { markPoint: averageOrigin.markPoint } : {})
        }],
        animationDuration: 600
      };

      chart.setOption(option, true);
      chart.resize();
    }

    function parseWinRateBreakdown(text) {
      if (text == null || !String(text).trim()) return [];
      const items = [];
      String(text).split('、').forEach((part) => {
        const trimmed = part.trim();
        if (!trimmed) return;
        const match = trimmed.match(/^(.+?)（(\d+)次，([\d.]+%)）$/);
        if (!match) return;
        items.push({
          label: match[1],
          count: Number(match[2]),
          rate: parseValue(match[3], match[3]),
        });
      });
      return items;
    }

    function sortWinrateForChart(items) {
      return [...items].sort((a, b) => a.rate - b.rate || a.count - b.count);
    }

    function getWinrateAxisMax(items) {
      const peak = Math.max(...items.map(d => d.rate), 0);
      return peak >= 99.5 ? 118 : 100;
    }

    function buildWinrateBarLabel(d) {
      const text = `${formatPercent(d.rate)}（${d.count}次）`;
      if (d.rate >= 92) {
        return {
          show: true,
          formatter: text,
          position: 'insideRight',
          color: CHART_SURFACE,
          fontSize: isMobile() ? 10 : 11,
        };
      }
      return {
        show: true,
        formatter: text,
        position: 'right',
        color: CHART_TEXT,
        fontSize: isMobile() ? 10 : 11,
      };
    }

    function getBanxingWolfRateChartItems(banxingLabel) {
      return getMinAppearanceRows()
        .map(player => {
          const match = parseWinRateBreakdown(player[BANXING_WOLF_RATE_COL])
            .find(item => item.label === banxingLabel);
          if (!match) return null;
          return {
            name: player[NAME_KEY],
            value: match.rate,
            appearances: match.count,
            wolfCount: Math.round(match.count * match.rate / 100),
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.value - b.value);
    }

    function getWinRateIdentityGroupLabels() {
      return WIN_RATE_IDENTITY_GROUPS.map(group => group.label);
    }

    function getWinRateIdentityGroup(groupLabel) {
      return WIN_RATE_IDENTITY_GROUPS.find(group => group.label === groupLabel);
    }

    function getMergedIdentityWinRate(player, identityLabels) {
      const items = parseWinRateBreakdown(player[IDENTITY_WIN_RATE_COL]);
      let totalCount = 0;
      let totalWins = 0;
      items.forEach(item => {
        if (!identityLabels.includes(item.label)) return;
        totalCount += item.count;
        totalWins += item.count * item.rate / 100;
      });
      if (totalCount === 0) return null;
      return {
        count: totalCount,
        rate: totalWins / totalCount * 100,
      };
    }

    function getWinRateIdentityGroupRanking(groupLabel) {
      const group = getWinRateIdentityGroup(groupLabel);
      if (!group) return [];
      return getMinAppearanceRows()
        .map(player => {
          const merged = getMergedIdentityWinRate(player, group.identities);
          if (!merged) return null;
          return { name: player[NAME_KEY], rate: merged.rate, count: merged.count };
        })
        .filter(Boolean);
    }

    function collectWinrateDimensionLabels(dimensionCol) {
      const counts = new Map();
      getMinAppearanceRows().forEach(player => {
        parseWinRateBreakdown(player[dimensionCol]).forEach(item => {
          counts.set(item.label, (counts.get(item.label) || 0) + item.count);
        });
      });
      return [...counts.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([label]) => label);
    }

    function getWinRateBanxingLabels() {
      if (!Array.isArray(banxingData) || !banxingData.length) return [];
      return [...banxingData]
        .filter(row => {
          const label = row['版型'];
          return label
            && !WIN_RATE_BANXING_EXCLUDED_LABELS.has(label)
            && parseValue(row['总场次'], '总场次') >= WIN_RATE_BANXING_MIN_COUNT;
        })
        .sort((a, b) => parseValue(b['总场次'], '总场次') - parseValue(a['总场次'], '总场次'))
        .map(row => row['版型']);
    }

    function getWolfRateBanxingLabels() {
      const labels = [WOLF_RATE_BANXING_ALL];
      const banxings = getWinRateBanxingLabels();
      const rest = banxings.filter(label => label !== WOLF_RATE_PRIORITY_BANXING);
      const hasPriority = banxings.includes(WOLF_RATE_PRIORITY_BANXING);
      if (hasPriority) {
        const priorityIndex = 1;
        while (labels.length < priorityIndex && rest.length) {
          labels.push(rest.shift());
        }
        labels.push(WOLF_RATE_PRIORITY_BANXING);
        labels.push(...rest);
      } else {
        labels.push(...banxings);
      }
      return labels;
    }

    function filterWinRateBreakdownItems(items, dimensionCol) {
      if (dimensionCol === IDENTITY_WIN_RATE_COL) {
        return items.filter(item => !WIN_RATE_EXCLUDED_IDENTITIES.has(item.label));
      }
      if (dimensionCol === BANXING_WIN_RATE_COL || dimensionCol === BANXING_WOLF_RATE_COL) {
        const allowed = new Set(getWinRateBanxingLabels());
        return items.filter(item => allowed.has(item.label));
      }
      return items;
    }

    function getWinRateDimensionRanking(dimensionCol, label) {
      return getMinAppearanceRows()
        .map(player => {
          const match = parseWinRateBreakdown(player[dimensionCol]).find(item => item.label === label);
          if (!match) return null;
          return { name: player[NAME_KEY], rate: match.rate, count: match.count };
        })
        .filter(Boolean);
    }

    function renderWinRateEmptyChart(message) {
      setChartHeight(0);
      chart.setOption({
        backgroundColor: 'transparent',
        title: {
          subtext: message,
          left: 'center',
          top: 'center',
          subtextStyle: { color: CHART_AXIS, fontSize: 12 },
        },
        series: [],
      }, true);
      chart.resize();
    }

    function renderWinrateBarChart(rawItems, { title, average, emptySubtext, rateLabel = '胜率' } = {}) {
      const layout = getChartLayout();
      const display = sortWinrateForChart(
        rawItems.map(d => ({
          label: d.label ?? d.name,
          rate: d.rate ?? d.value ?? 0,
          count: d.count ?? 0,
        }))
      );

      setChartHeight(Math.max(display.length, 1));

      if (!display.length) {
        renderWinRateEmptyChart(emptySubtext || '暂无数据');
        return;
      }

      const axisMax = getWinrateAxisMax(display);
      const avg = average ?? display.reduce((sum, d) => sum + d.rate, 0) / display.length;
      const gridTop = title ? layout.gridTop + 24 : layout.gridTop;

      chart.clear();
      chart.setOption({
        backgroundColor: 'transparent',
        title: title ? {
          text: title,
          left: 'center',
          top: layout.gridTop,
          textStyle: {
            color: CHART_TEXT,
            fontSize: layout.titleFontSize - 2,
            fontWeight: 600,
          },
        } : undefined,
        tooltip: {
          trigger: 'item',
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {

    function renderMetricBarChart(column, options = {}) {
      const { excludeZero = false, requirePositiveCol = null, items: overrideItems = null } = options;
      const items = overrideItems ?? getChartData(column, { excludeZero, requirePositiveCol });
      const isWolfRateChart = column === WOLF_RATE_COL;
      const isNonFirstWolfRateChart = column === NON_FIRST_WOLF_RATE_COL;
      const isWolfRateLikeChart = isWolfRateChart || isNonFirstWolfRateChart;
      const isGoodSheriffBelowChart = column === GOOD_SHERIFF_BELOW_RATE_COL;
      const isRateWithMetaLabel = isWolfRateLikeChart || isGoodSheriffBelowChart;
      const isPercent = PERCENT_COLUMNS.has(column);
      const isRateColumn = column.includes('率');
      const average = overrideItems
        ? (items.length ? items.reduce((sum, d) => sum + d.value, 0) / items.length : 0)
        : getColumnAverage(column);
      const layout = getChartLayout();

      setChartHeight(items.length);

      const axisFormatter = isPercent
        ? (v) => formatPercent(v)
        : SURVIVAL_DAY_COLUMNS.has(column)
          ? (v) => Number(v).toFixed(1)
          : '{value}';

      const barLabel = {
        show: isRateWithMetaLabel ? true : layout.showBarLabel,
        position: 'right',
        color: CHART_TEXT,
      };
      if (isRateWithMetaLabel) {
        barLabel.rich = {
          rate: { color: CHART_TEXT, fontSize: isMobile() ? 10 : 11, fontWeight: 'normal' },
          meta: { color: CHART_AXIS, fontSize: isMobile() ? 8 : 9, fontWeight: 'normal' },
        };
        barLabel.formatter = (params) => {
          const rateText = formatValue(params.value, column);
          const metaCount = isGoodSheriffBelowChart
            ? params.data?.goodCount
            : params.data?.wolfCount;
          return metaCount != null ? `{rate|${rateText}}{meta|（${metaCount}）}` : rateText;
        };
      } else {
        barLabel.formatter = ({ value }) => formatValue(value, column);
      }

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: CHART_TOOLTIP_BG,
          borderColor: CHART_TOOLTIP_BORDER,
          textStyle: { color: CHART_TEXT },
          formatter(params) {
            const p = params[0];
            const item = items[p.dataIndex];
            if (isWolfRateLikeChart && item) {
              if (isNonFirstWolfRateChart) {
                return [
                  item.name,
                  `非首局出场次数：${item.nonFirstAppearances ?? 0}`,
                  `非首局狼次数：${item.wolfCount ?? 0}`,
                  `${column}：${formatValue(p.value, column)}`,
                ].join('<br/>');
              }
              return [
                item.name,
                `出场次数：${item.appearances}`,
                `狼次数：${item.wolfCount ?? 0}`,
                `${column}：${formatValue(p.value, column)}`,
              ].join('<br/>');
            }
            if (isGoodSheriffBelowChart && item) {
              return [
                item.name,
                `${GOOD_COUNT_COL}：${item.goodCount ?? 0}`,
                `${column}：${formatValue(p.value, column)}`,
              ].join('<br/>');
            }
            return `${p.name}<br/>${formatColumnLabel(column)}：${formatValue(p.value, column)}`;
          }
        },
        grid: getBarChartGrid(layout),
        xAxis: {
          type: 'value',
          axisLabel: {
            color: CHART_AXIS,
            fontSize: layout.axisFontSize,
            formatter: axisFormatter
          },
          splitLine: { lineStyle: { color: CHART_LINE } }
        },
        yAxis: buildBarCategoryYAxis(items.map(d => d.name), layout),
        series: [{
          type: 'bar',
          data: items.map(d => ({
            value: d.value,
            wolfCount: d.wolfCount,
            goodCount: d.goodCount,
            itemStyle: {
              borderRadius: [0, 4, 4, 0],
              color: getBarColor(d.value, average, isRateColumn)
            }
          })),
          ...getBarSeriesLayout(layout),
          label: barLabel,
        }],
        animationDuration: 600
      };

      finalizeBarChartOption(option, items, layout, {
        isPercent,
        showRightLabel: isRateWithMetaLabel || layout.showBarLabel,
        labelPeak: isRateWithMetaLabel && items.length
          ? Math.max(...items.map(d => d.value))
          : null,
        labelMaxCount: isRateWithMetaLabel && items.length
          ? Math.max(...items.map(d => (isGoodSheriffBelowChart ? d.goodCount : d.wolfCount) ?? 0))
          : null,
      });

      chart.setOption(option, true);
      chart.resize();
    }
